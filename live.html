<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stream – VIP</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables ── */
    :root {
      --red:   #ff2d55;
      --gold:  #ffd700;
      --dark:  #0a0a0f;
      --card:  #12121a;
      --border:#1e1e2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════
       VIDEO SECTION
    ══════════════════════════════════════ */
    #video-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 16/9;
      max-height: 60vh;
      overflow: hidden;
    }
    #live-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.5s ease;
    }
    /* Blur applied after 7s */
    #live-video.blurred { filter: blur(18px) brightness(0.4); }

    /* ── Overlay badges on video ── */
    .vid-badge {
      position: absolute;
      z-index: 10;
    }
    #badge-live {
      top: 12px; left: 12px;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 3px 10px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #badge-viewers {
      top: 12px; right: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: #ddd;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 5px;
    }

    /* ── Countdown overlay ── */
    #countdown-overlay {
      position: absolute;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,45,85,0.4);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.4s;
    }
    #countdown-overlay.hidden { opacity: 0; pointer-events: none; }
    #countdown-num {
      font-family: 'Bebas Neue', cursive;
      font-size: 20px;
      color: var(--red);
      min-width: 20px;
      text-align: center;
    }

    /* ── Pulse dot for LIVE ── */
    .live-dot {
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
      display: inline-block;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.6); }
      50%      { box-shadow: 0 0 0 5px rgba(255,255,255,0); }
    }

    /* ══════════════════════════════════════
       LOCK POPUP / MODAL
    ══════════════════════════════════════ */
    #lock-modal {
      display: none; /* shown via JS */
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.35s ease;
    }
    #lock-modal.active { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 340px;
      width: 92%;
      text-align: center;
      box-shadow: 0 0 60px rgba(255,45,85,0.15);
      animation: slideUp 0.35s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-icon {
      font-size: 44px;
      margin-bottom: 12px;
      display: block;
    }
    .modal-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--red);
      margin-bottom: 6px;
    }
    .modal-sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 22px;
      line-height: 1.5;
    }
    #token-input {
      width: 100%;
      background: #0d0d18;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 3px;
      text-align: center;
      padding: 11px 14px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    #token-input:focus { border-color: var(--red); }
    #token-input.error { border-color: #ff4444; animation: shake 0.35s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }
    #unlock-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--red), #7928ca);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    #unlock-btn:hover { opacity: 0.9; transform: scale(1.02); }
    #token-error {
      color: #ff4444;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* ══════════════════════════════════════
       VIP TOAST
    ══════════════════════════════════════ */
    #vip-toast {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      z-index: 200;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #000;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1px;
      padding: 10px 24px;
      border-radius: 40px;
      box-shadow: 0 4px 30px rgba(255,215,0,0.4);
      transition: transform 0.4s ease;
    }
    #vip-toast.show { transform: translateX(-50%) translateY(0); }

    /* ══════════════════════════════════════
       INFO BAR (below video)
    ══════════════════════════════════════ */
    #info-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #streamer-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), #7928ca);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      border: 2px solid var(--red);
      flex-shrink: 0;
    }
    #streamer-name {
      font-weight: 600;
      font-size: 15px;
      color: #f0f0f0;
    }
    #streamer-tag { font-size: 11px; color: #666; }

    /* ══════════════════════════════════════
       CHAT SECTION
    ══════════════════════════════════════ */
    #chat-section {
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 340px;
    }
    #chat-header {
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #666;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Individual chat message */
    .chat-msg {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      animation: msgIn 0.25s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .chat-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .chat-username {
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 2px;
    }
    .chat-text {
      font-size: 13px;
      color: #ccc;
      line-height: 1.4;
    }

    /* Chat input bar */
    #chat-input-bar {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #chat-input {
      flex: 1;
      background: #0d0d18;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 8px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #chat-input:focus { border-color: var(--red); }
    #chat-send {
      background: var(--red);
      border: none;
      border-radius: 50%;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    #chat-send:hover { transform: scale(1.1); opacity: 0.9; }

    /* ══════════════════════════════════════
       FLOATING EMOJI REACTIONS
    ══════════════════════════════════════ */
    #emoji-layer {
      position: fixed;
      bottom: 80px;
      right: 16px;
      width: 50px;
      pointer-events: none;
      z-index: 30;
    }
    .float-emoji {
      position: absolute;
      bottom: 0;
      right: 0;
      font-size: 22px;
      animation: floatUp 3s ease-out forwards;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)   scale(0.5); opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(-220px) scale(1.1); opacity: 0; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
  <div id="authBox" style="text-align:center; padding:20px;">
  <h2>Login / Signup</h2>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

  <!-- ═══════════ HEADER ═══════════ -->
  <header style="background:var(--card); border-bottom:1px solid var(--border); padding:10px 14px;"
          class="flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Back
    </a>
    <span style="font-family:'Bebas Neue',cursive;font-size:22px;color:#ff2d55;letter-spacing:2px;">
      LIVE<span style="color:#ffd700;">VIP</span>
    </span>
    <div style="width:50px"></div><!-- spacer -->
  </header>

  <!-- ═══════════ VIDEO WRAPPER ═══════════ -->
  <div id="video-wrapper">

    <!-- The main video element -->
    <video
      id="live-video"
      autoplay
      muted
      loop
      playsinline
    ></video>

    <!-- LIVE badge (top-left) -->
    <div id="badge-live" class="vid-badge">
      <span class="live-dot"></span>
      LIVE
    </div>

    <!-- Viewer count (top-right) -->
    <div id="badge-viewers" class="vid-badge">
      👁 <span id="viewer-count">0</span>
    </div>

    <!-- 7-second countdown bar (bottom center) -->
    <div id="countdown-overlay">
      <span>Free preview:</span>
      <span id="countdown-num">7</span>
      <span>sec left</span>
    </div>

  </div>

  <!-- ═══════════ INFO BAR ═══════════ -->
  <div id="info-bar">
    <div id="streamer-avatar">?</div>
    <div>
      <div id="streamer-name">Loading…</div>
      <div id="streamer-tag">🔴 Live now</div>
    </div>
    <!-- Floating emoji trigger button -->
    <button id="react-btn"
      style="margin-left:auto;background:transparent;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:16px;cursor:pointer;color:#e0e0e0;"
      onclick="sendReaction()">
      ❤️
    </button>
  </div>

  <!-- ═══════════ CHAT SECTION ═══════════ -->
  <div id="chat-section">

    <div id="chat-header">💬 Live Chat</div>

    <!-- Messages list — auto-scrolls -->
    <div id="chat-messages"></div>

    <!-- Input bar -->
    <div id="chat-input-bar">
      <input id="chat-input" type="text" placeholder="Say something…" maxlength="100" />
      <button id="chat-send" onclick="sendManualChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

  </div>

  <!-- ═══════════ EMOJI FLOAT LAYER ═══════════ -->
  <div id="emoji-layer"></div>

  <!-- ═══════════ LOCK MODAL ═══════════ -->
  <div id="lock-modal">
    <div class="modal-box">
      <span class="modal-icon">🔒</span>
      <div class="modal-title">Preview Ended</div>
      <p class="modal-sub">
        Your free 7-second preview is over.<br/>
        Enter your <strong style="color:var(--gold);">VIP token</strong> to continue watching.
      </p>
      <input
        id="token-input"
        type="text"
        placeholder="ENTER TOKEN"
        maxlength="10"
        autocomplete="off"
      />
      <div id="token-error">❌ Invalid token. Try again.</div>
      <button id="unlock-btn" onclick="tryUnlock()">🔓 UNLOCK NOW</button>
      <p style="font-size:11px;color:#444;margin-top:14px;">Hint: token is <span style="color:#555;">VIP786</span></p>
    </div>
  </div>

  <!-- ═══════════ VIP TOAST ═══════════ -->
  <div id="vip-toast">👑 VIP UNLOCKED — Enjoy the stream!</div>

  <!-- ═══════════ JAVASCRIPT ═══════════ -->
  <script>
    // ════════════════════════════════════════════════
    // CONSTANTS
    // ════════════════════════════════════════════════
    const CORRECT_TOKEN  = 'VIP786';    // Token to unlock stream
    const PREVIEW_SECS   = 7;           // Countdown duration
    const LOCK_KEY       = 'streamLocked';   // localStorage key for lock state
    const UNLOCK_KEY     = 'streamUnlocked'; // localStorage key for unlock state

    // ════════════════════════════════════════════════
    // LOAD PROFILE FROM LOCALSTORAGE
    // ════════════════════════════════════════════════
    const profileData = JSON.parse(localStorage.getItem('selectedProfile'));

    // If no profile saved, redirect home
    if (!profileData) {
      window.location.href = 'index.html';
    }

    // ── DOM references ──
    const video        = document.getElementById('live-video');
    const avatarEl     = document.getElementById('streamer-avatar');
    const nameEl       = document.getElementById('streamer-name');
    const viewerEl     = document.getElementById('viewer-count');
    const countdownEl  = document.getElementById('countdown-overlay');
    const countNumEl   = document.getElementById('countdown-num');
    const lockModal    = document.getElementById('lock-modal');
    const tokenInput   = document.getElementById('token-input');
    const tokenError   = document.getElementById('token-error');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput    = document.getElementById('chat-input');
    const emojiLayer   = document.getElementById('emoji-layer');
    const vipToast     = document.getElementById('vip-toast');

    // ════════════════════════════════════════════════
    // SET UP VIDEO & PROFILE UI
    // ════════════════════════════════════════════════
    function initProfile() {
      // Set video source dynamically from profile
      video.src = profileData.video;

      // Avatar initial + name
      avatarEl.textContent = profileData.name.charAt(0).toUpperCase();
      nameEl.textContent   = profileData.name;

      // Starting viewer count
      viewerEl.textContent = formatViewers(profileData.viewers || 1200);
    }

    function formatViewers(n) {
      return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : n.toString();
    }

    // ════════════════════════════════════════════════
    // VIEWER COUNT — random drift every 4 seconds
    // ════════════════════════════════════════════════
    let viewerBase = profileData?.viewers || 1200;
    function updateViewers() {
      const delta = Math.floor(Math.random() * 80) - 30; // ±30
      viewerBase = Math.max(100, viewerBase + delta);
      viewerEl.textContent = formatViewers(viewerBase);
    }
    setInterval(updateViewers, 4000);

    // ════════════════════════════════════════════════
    // CHECK LOCK STATE ON PAGE LOAD
    // If user was locked before, show modal immediately
    // ════════════════════════════════════════════════
    function checkLockState() {
      const isUnlocked = localStorage.getItem(UNLOCK_KEY) === 'true';
      const isLocked   = localStorage.getItem(LOCK_KEY)   === 'true';

      if (isUnlocked) {
        // Already VIP — play freely, no countdown
        countdownEl.classList.add('hidden');
        return false; // don't start countdown
      }
      if (isLocked) {
        // Was locked before refresh — show modal immediately
        lockVideo();
        return false; // don't start countdown
      }
      return true; // fresh visit — start countdown
    }

    // ════════════════════════════════════════════════
    // 7-SECOND COUNTDOWN SYSTEM
    // ════════════════════════════════════════════════
    let countdown = PREVIEW_SECS;

    function startCountdown() {
      const timer = setInterval(() => {
        countdown--;
        countNumEl.textContent = countdown;

        if (countdown <= 0) {
          clearInterval(timer);
          countdownEl.classList.add('hidden');
          lockVideo(); // 🔒 Lock after 7 seconds
        }
      }, 1000);
    }

    // ════════════════════════════════════════════════
    // LOCK VIDEO — blur, pause, show modal, save state
    // ════════════════════════════════════════════════
    function lockVideo() {
      video.classList.add('blurred');
      video.pause();
      lockModal.classList.add('active');
      localStorage.setItem(LOCK_KEY, 'true'); // persist lock across refresh
    }

    // ════════════════════════════════════════════════
    // TOKEN UNLOCK SYSTEM
    // Called when user clicks "UNLOCK NOW"
    // ════════════════════════════════════════════════
    function tryUnlock() {
      const entered = tokenInput.value.trim().toUpperCase();

      if (entered === CORRECT_TOKEN) {
        // ✅ Correct token
        lockModal.classList.remove('active');
        video.classList.remove('blurred');
        video.play();
        localStorage.setItem(UNLOCK_KEY, 'true'); // save unlock state
        localStorage.removeItem(LOCK_KEY);
        showVipToast();
      } else {
        // ❌ Wrong token
        tokenInput.classList.add('error');
        tokenError.style.display = 'block';
        setTimeout(() => tokenInput.classList.remove('error'), 400);
        tokenInput.value = '';
        tokenInput.focus();
      }
    }

    // Allow pressing Enter in token input
    tokenInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') tryUnlock();
      tokenError.style.display = 'none'; // hide error on typing
    });

    // ════════════════════════════════════════════════
    // VIP TOAST — slide down then back up
    // ════════════════════════════════════════════════
    function showVipToast() {
      vipToast.classList.add('show');
      setTimeout(() => vipToast.classList.remove('show'), 3500);
    }

    // ════════════════════════════════════════════════
    // CHAT SYSTEM
    // ════════════════════════════════════════════════

    // Fake usernames & messages pool
    const chatPool = {
      users: [
        { name: 'xXNovaXx',   color: '#ff6b6b' },
        { name: 'KingCobraZ',  color: '#ffd700' },
        { name: 'LunaKiss',    color: '#c084fc' },
        { name: 'RealDeal99',  color: '#34d399' },
        { name: 'GhostRider',  color: '#60a5fa' },
        { name: 'StarMuffin',  color: '#f472b6' },
        { name: 'DragonFlare', color: '#fb923c' },
        { name: 'ShadowCat',   color: '#94a3b8' },
        { name: 'VIPMember',   color: '#ffd700' },
        { name: 'TechWizard',  color: '#2dd4bf' },
      ],
      messages: [
        '❤️ so beautiful omg',
        '💎 VIP gang represent!',
        'this is insane 🔥🔥',
        'been waiting all day for this',
        'first time here, WOW',
        '😍😍😍 amazing',
        'drop the token plz 🙏',
        'best stream ever lol',
        'hello from India 🇮🇳',
        'watching this daily fr',
        'quality is 🔥',
        '💰💰💰',
        'where do I get token?',
        'legendary stream rn',
        '👏 king/queen of live',
        'more like this please',
        'wtf how 😂',
        'sending love ❤️',
        'can\'t stop watching',
        '💎 diamond tier',
      ],
      emojis: ['❤️', '💎', '🔥', '😍', '👑', '✨', '💫', '🎉', '🌹', '💕'],
    };

    // Pick a random item from an array
    function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    // Add one chat message to the list
    function addChatMsg(username, color, text, isUser = false) {
      const msg = document.createElement('div');
      msg.className = 'chat-msg';

      const initial = username.charAt(0).toUpperCase();
      const avatarBg = isUser ? '#ff2d55' : color;

      msg.innerHTML = `
        <div class="chat-avatar" style="background:${avatarBg};">${initial}</div>
        <div>
          <div class="chat-username" style="color:${isUser ? '#ff2d55' : color};">${username}</div>
          <div class="chat-text">${text}</div>
        </div>
      `;

      chatMessages.appendChild(msg);

      // Auto-scroll to bottom
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // Keep only last 80 messages to avoid memory issues
      const msgs = chatMessages.querySelectorAll('.chat-msg');
      if (msgs.length > 80) msgs[0].remove();
    }

    // Auto-post fake messages every 2.5–5 seconds
    function startAutoChat() {
      function postNext() {
        const user = rnd(chatPool.users);
        const msg  = rnd(chatPool.messages);
        addChatMsg(user.name, user.color, msg);
        // Random interval between 2.5s and 5s
        const delay = 2500 + Math.random() * 2500;
        setTimeout(postNext, delay);
      }
      setTimeout(postNext, 1200); // first message after 1.2s
    }

    // Manual chat send
    function sendManualChat() {
      const text = chatInput.value.trim();
      if (!text) return;
      addChatMsg('You', '#ff2d55', text, true);
      chatInput.value = '';
      chatInput.focus();
    }

    // Allow Enter key to send chat
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendManualChat();
    });

    // ════════════════════════════════════════════════
    // FLOATING EMOJI REACTIONS
    // ════════════════════════════════════════════════
    function sendReaction() {
      const emoji = rnd(chatPool.emojis);
      spawnEmoji(emoji);
    }

    function spawnEmoji(emoji) {
      const el = document.createElement('div');
      el.className = 'float-emoji';
      el.textContent = emoji;
      // Slight horizontal scatter
      el.style.right = (Math.random() * 40 - 20) + 'px';
      emojiLayer.appendChild(el);
      // Remove after animation completes (3s)
      setTimeout(() => el.remove(), 3000);
    }

    // Auto-spawn random emojis every 4–8 seconds
    function startAutoEmoji() {
      function spawnNext() {
        spawnEmoji(rnd(chatPool.emojis));
        setTimeout(spawnNext, 4000 + Math.random() * 4000);
      }
      setTimeout(spawnNext, 3000);
    }

    // ════════════════════════════════════════════════
    // INIT — Run everything on page load
    // ════════════════════════════════════════════════
    initProfile();                        // Set video + profile info
    const shouldCount = checkLockState(); // Check if locked/unlocked already
    if (shouldCount) startCountdown();    // Start 7-sec countdown if fresh
    startAutoChat();                      // Start fake chat messages
    startAutoEmoji();                     // Start random emoji floats

    // Add a welcome message to chat
    setTimeout(() => {
      addChatMsg('System', '#ffd700', `🎉 Welcome to ${profileData?.name}'s stream!`);
    }, 500);

  </script>
