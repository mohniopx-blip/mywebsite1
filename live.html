<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stream – VIP</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --red:   #ff2d55;
      --gold:  #ffd700;
      --dark:  #0a0a0f;
      --card:  #12121a;
      --border:#1e1e2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #video-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 16/9;
      max-height: 60vh;
      overflow: hidden;
    }
    #live-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.5s ease;
    }
    #live-video.blurred { filter: blur(18px) brightness(0.4); }

    .vid-badge { position: absolute; z-index: 10; }
    #badge-live {
      top: 12px; left: 12px;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 3px 10px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #badge-viewers {
      top: 12px; right: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: #ddd;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 5px;
    }
    #countdown-overlay {
      position: absolute;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,45,85,0.4);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.4s;
    }
    #countdown-overlay.hidden { opacity: 0; pointer-events: none; }
    #countdown-num {
      font-family: 'Bebas Neue', cursive;
      font-size: 20px;
      color: var(--red);
      min-width: 20px;
      text-align: center;
    }

    .live-dot {
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
      display: inline-block;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.6); }
      50%      { box-shadow: 0 0 0 5px rgba(255,255,255,0); }
    }

    #lock-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.35s ease;
    }
    #lock-modal.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 340px;
      width: 92%;
      text-align: center;
      box-shadow: 0 0 60px rgba(255,45,85,0.15);
      animation: slideUp 0.35s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-icon { font-size: 44px; margin-bottom: 12px; display: block; }
    .modal-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--red);
      margin-bottom: 6px;
    }
    .modal-sub { font-size: 13px; color: #888; margin-bottom: 22px; line-height: 1.5; }
    #token-input {
      width: 100%;
      background: #0d0d18;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 3px;
      text-align: center;
      padding: 11px 14px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    #token-input:focus { border-color: var(--red); }
    #token-input.error { border-color: #ff4444; animation: shake 0.35s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }
    #unlock-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--red), #7928ca);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    #unlock-btn:hover { opacity: 0.9; transform: scale(1.02); }
    #token-error { color: #ff4444; font-size: 12px; margin-top: 8px; display: none; }

    #vip-toast {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      z-index: 200;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #000;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1px;
      padding: 10px 24px;
      border-radius: 40px;
      box-shadow: 0 4px 30px rgba(255,215,0,0.4);
      transition: transform 0.4s ease;
    }
    #vip-toast.show { transform: translateX(-50%) translateY(0); }

    #info-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #streamer-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), #7928ca);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      border: 2px solid var(--red);
      flex-shrink: 0;
    }
    #streamer-name { font-weight: 600; font-size: 15px; color: #f0f0f0; }
    #streamer-tag { font-size: 11px; color: #666; }

    /* ── User tag in info bar ── */
    #user-tag-bar {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #555;
    }
    #user-tag-bar .utag {
      background: rgba(255,45,85,0.1);
      border: 1px solid rgba(255,45,85,0.2);
      border-radius: 12px;
      padding: 2px 8px;
      color: #ff6b6b;
      font-size: 11px;
      font-weight: 600;
    }

    #chat-section {
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 340px;
    }
    #chat-header {
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #666;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .chat-msg {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      animation: msgIn 0.25s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .chat-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .chat-username { font-size: 12px; font-weight: 600; color: var(--gold); margin-bottom: 2px; }
    .chat-text { font-size: 13px; color: #ccc; line-height: 1.4; }

    #chat-input-bar {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #chat-input {
      flex: 1;
      background: #0d0d18;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 8px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #chat-input:focus { border-color: var(--red); }
    #chat-send {
      background: var(--red);
      border: none;
      border-radius: 50%;
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    #chat-send:hover { transform: scale(1.1); opacity: 0.9; }

    #emoji-layer {
      position: fixed;
      bottom: 80px;
      right: 16px;
      width: 50px;
      pointer-events: none;
      z-index: 30;
    }
    .float-emoji {
      position: absolute;
      bottom: 0; right: 0;
      font-size: 22px;
      animation: floatUp 3s ease-out forwards;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)   scale(0.5); opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(-220px) scale(1.1); opacity: 0; }
    }

    /* Page loading overlay */
    #page-loader {
      position: fixed;
      inset: 0;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.4s;
    }
    #page-loader.fade-out { opacity: 0; pointer-events: none; }
    .loader-logo { font-family: 'Bebas Neue', cursive; font-size: 42px; color: var(--red); letter-spacing: 3px; animation: logoPulse 1s ease-in-out infinite; }
    .loader-logo span { color: var(--gold); }
    @keyframes logoPulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Page loader -->
  <div id="page-loader">
    <div class="loader-logo">LIVE<span>VIP</span></div>
  </div>

  <!-- ═══════════ HEADER ═══════════ -->
  <header style="background:var(--card); border-bottom:1px solid var(--border); padding:10px 14px;"
          class="flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Back
    </a>
    <span style="font-family:'Bebas Neue',cursive;font-size:22px;color:#ff2d55;letter-spacing:2px;">
      LIVE<span style="color:#ffd700;">VIP</span>
    </span>
    <!-- Logout button -->
    <button onclick="handleLogout()"
      style="font-size:11px;color:#555;background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 10px;cursor:pointer;transition:color 0.2s,border-color 0.2s;"
      onmouseover="this.style.color='#ff2d55';this.style.borderColor='rgba(255,45,85,0.4)'"
      onmouseout="this.style.color='#555';this.style.borderColor='var(--border)'">
      🚪 Logout
    </button>
  </header>

  <!-- ═══════════ VIDEO WRAPPER ═══════════ -->
  <div id="video-wrapper">
    <video id="live-video" autoplay muted loop playsinline></video>
    <div id="badge-live" class="vid-badge">
      <span class="live-dot"></span> LIVE
    </div>
    <div id="badge-viewers" class="vid-badge">
      👁 <span id="viewer-count">0</span>
    </div>
    <div id="countdown-overlay">
      <span>Free preview:</span>
      <span id="countdown-num">7</span>
      <span>sec left</span>
    </div>
  </div>

  <!-- ═══════════ INFO BAR ═══════════ -->
  <div id="info-bar">
    <div id="streamer-avatar">?</div>
    <div>
      <div id="streamer-name">Loading…</div>
      <div id="streamer-tag">🔴 Live now</div>
    </div>
    <!-- Logged-in user tag -->
    <div id="user-tag-bar">
      <span class="utag" id="live-user-tag">You</span>
      <button id="react-btn"
        style="background:transparent;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:16px;cursor:pointer;color:#e0e0e0;"
        onclick="sendReaction()">❤️</button>
    </div>
  </div>

  <!-- ═══════════ CHAT SECTION ═══════════ -->
  <div id="chat-section">
    <div id="chat-header">💬 Live Chat</div>
    <div id="chat-messages"></div>
    <div id="chat-input-bar">
      <input id="chat-input" type="text" placeholder="Say something…" maxlength="100" />
      <button id="chat-send" onclick="sendManualChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ═══════════ EMOJI FLOAT LAYER ═══════════ -->
  <div id="emoji-layer"></div>

  <!-- ═══════════ LOCK MODAL ═══════════ -->
  <div id="lock-modal">
    <div class="modal-box">
      <span class="modal-icon">🔒</span>
      <div class="modal-title">Preview Ended</div>
      <p class="modal-sub">
        Your free 7-second preview is over.<br/>
        Enter your <strong style="color:var(--gold);">VIP token</strong> to continue watching.
      </p>
      <input id="token-input" type="text" placeholder="ENTER TOKEN" maxlength="10" autocomplete="off" />
      <div id="token-error">❌ Invalid token. Try again.</div>
      <button id="unlock-btn" onclick="tryUnlock()">🔓 UNLOCK NOW</button>
      <p style="font-size:11px;color:#444;margin-top:14px;">Hint: token is <span style="color:#555;">VIP786</span></p>
    </div>
  </div>

  <!-- ═══════════ VIP TOAST ═══════════ -->
  <div id="vip-toast">👑 VIP UNLOCKED — Enjoy the stream!</div>

  <!-- ═══════════ JAVASCRIPT ═══════════ -->
  <script>
    // ── Firebase Init ──
    const firebaseConfig = {
      apiKey: "AIzaSyApXJIZOaoQfSze9myODDs9Y6O2fW_IEwI",
      authDomain: "vip-live-5a1c1.firebaseapp.com",
      projectId: "vip-live-5a1c1",
      storageBucket: "vip-live-5a1c1.firebasestorage.app",
      messagingSenderId: "90875845422",
      appId: "1:90875845422:web:83b8f3d4c3781f44f4f8bf",
      measurementId: "G-F286K080R8"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ── Auth Guard ──
    let currentUser = null;
    auth.onAuthStateChanged((user) => {
      const loader = document.getElementById('page-loader');
      if (!user) {
        window.location.href = 'auth.html';
        return;
      }
      currentUser = user;
      const displayName = user.displayName || user.email.split('@')[0];
      document.getElementById('live-user-tag').textContent = displayName;

      // Hide loader
      loader.classList.add('fade-out');
      setTimeout(() => loader.style.display = 'none', 400);
    });

    // ── Logout ──
    async function handleLogout() {
      await auth.signOut();
      window.location.href = 'auth.html';
    }

    // ════════════════════════════════════════════════
    // CONSTANTS
    // ════════════════════════════════════════════════
    const CORRECT_TOKEN = 'VIP786';
    const PREVIEW_SECS  = 7;
    const LOCK_KEY      = 'streamLocked';
    const UNLOCK_KEY    = 'streamUnlocked';

    const profileData = JSON.parse(localStorage.getItem('selectedProfile'));
    if (!profileData) window.location.href = 'index.html';

    const video        = document.getElementById('live-video');
    const avatarEl     = document.getElementById('streamer-avatar');
    const nameEl       = document.getElementById('streamer-name');
    const viewerEl     = document.getElementById('viewer-count');
    const countdownEl  = document.getElementById('countdown-overlay');
    const countNumEl   = document.getElementById('countdown-num');
    const lockModal    = document.getElementById('lock-modal');
    const tokenInput   = document.getElementById('token-input');
    const tokenError   = document.getElementById('token-error');
    const chatMessages = document.getElementById('chat-messages');
    const chatInput    = document.getElementById('chat-input');
    const emojiLayer   = document.getElementById('emoji-layer');
    const vipToast     = document.getElementById('vip-toast');

    function initProfile() {
      video.src = profileData.video;
      avatarEl.textContent = profileData.name.charAt(0).toUpperCase();
      nameEl.textContent   = profileData.name;
      viewerEl.textContent = formatViewers(profileData.viewers || 1200);
    }

    function formatViewers(n) {
      return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : n.toString();
    }

    let viewerBase = profileData?.viewers || 1200;
    function updateViewers() {
      const delta = Math.floor(Math.random() * 80) - 30;
      viewerBase = Math.max(100, viewerBase + delta);
      viewerEl.textContent = formatViewers(viewerBase);
    }
    setInterval(updateViewers, 4000);

    function checkLockState() {
      const isUnlocked = localStorage.getItem(UNLOCK_KEY) === 'true';
      const isLocked   = localStorage.getItem(LOCK_KEY)   === 'true';
      if (isUnlocked) { countdownEl.classList.add('hidden'); return false; }
      if (isLocked)   { lockVideo(); return false; }
      return true;
    }

    let countdown = PREVIEW_SECS;
    function startCountdown() {
      const timer = setInterval(() => {
        countdown--;
        countNumEl.textContent = countdown;
        if (countdown <= 0) {
          clearInterval(timer);
          countdownEl.classList.add('hidden');
          lockVideo();
        }
      }, 1000);
    }

    function lockVideo() {
      video.classList.add('blurred');
      video.pause();
      lockModal.classList.add('active');
      localStorage.setItem(LOCK_KEY, 'true');
    }

    function tryUnlock() {
      const entered = tokenInput.value.trim().toUpperCase();
      if (entered === CORRECT_TOKEN) {
        lockModal.classList.remove('active');
        video.classList.remove('blurred');
        video.play();
        localStorage.setItem(UNLOCK_KEY, 'true');
        localStorage.removeItem(LOCK_KEY);
        showVipToast();
      } else {
        tokenInput.classList.add('error');
        tokenError.style.display = 'block';
        setTimeout(() => tokenInput.classList.remove('error'), 400);
        tokenInput.value = '';
        tokenInput.focus();
      }
    }

    tokenInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') tryUnlock();
      tokenError.style.display = 'none';
    });

    function showVipToast() {
      vipToast.classList.add('show');
      setTimeout(() => vipToast.classList.remove('show'), 3500);
    }

    // ════════════════════════════════════════════════
    // CHAT SYSTEM
    // ════════════════════════════════════════════════
    const chatPool = {
      users: [
        { name: 'xXNovaXx',   color: '#ff6b6b' },
        { name: 'KingCobraZ',  color: '#ffd700' },
        { name: 'LunaKiss',    color: '#c084fc' },
        { name: 'RealDeal99',  color: '#34d399' },
        { name: 'GhostRider',  color: '#60a5fa' },
        { name: 'StarMuffin',  color: '#f472b6' },
        { name: 'DragonFlare', color: '#fb923c' },
        { name: 'ShadowCat',   color: '#94a3b8' },
        { name: 'VIPMember',   color: '#ffd700' },
        { name: 'TechWizard',  color: '#2dd4bf' },
      ],
      messages: [
        '❤️ so beautiful omg','💎 VIP gang represent!','this is insane 🔥🔥',
        'been waiting all day for this','first time here, WOW','😍😍😍 amazing',
        'drop the token plz 🙏','best stream ever lol','hello from India 🇮🇳',
        'watching this daily fr','quality is 🔥','💰💰💰','where do I get token?',
        'legendary stream rn','👏 king/queen of live','more like this please',
        'wtf how 😂','sending love ❤️','can\'t stop watching','💎 diamond tier',
      ],
      emojis: ['❤️','💎','🔥','😍','👑','✨','💫','🎉','🌹','💕'],
    };

    function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function addChatMsg(username, color, text, isUser = false) {
      const msg = document.createElement('div');
      msg.className = 'chat-msg';
      const initial  = username.charAt(0).toUpperCase();
      const avatarBg = isUser ? '#ff2d55' : color;
      msg.innerHTML = `
        <div class="chat-avatar" style="background:${avatarBg};">${initial}</div>
        <div>
          <div class="chat-username" style="color:${isUser ? '#ff2d55' : color};">${username}</div>
          <div class="chat-text">${text}</div>
        </div>
      `;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      const msgs = chatMessages.querySelectorAll('.chat-msg');
      if (msgs.length > 80) msgs[0].remove();
    }

    function startAutoChat() {
      function postNext() {
        const user = rnd(chatPool.users);
        addChatMsg(user.name, user.color, rnd(chatPool.messages));
        setTimeout(postNext, 2500 + Math.random() * 2500);
      }
      setTimeout(postNext, 1200);
    }

    function sendManualChat() {
      const text = chatInput.value.trim();
      if (!text) return;
      // Use logged-in user's display name if available
      const myName = currentUser
        ? (currentUser.displayName || currentUser.email.split('@')[0])
        : 'You';
      addChatMsg(myName, '#ff2d55', text, true);
      chatInput.value = '';
      chatInput.focus();
    }

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendManualChat();
    });

    function sendReaction() { spawnEmoji(rnd(chatPool.emojis)); }

    function spawnEmoji(emoji) {
      const el = document.createElement('div');
      el.className = 'float-emoji';
      el.textContent = emoji;
      el.style.right = (Math.random() * 40 - 20) + 'px';
      emojiLayer.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function startAutoEmoji() {
      function spawnNext() {
        spawnEmoji(rnd(chatPool.emojis));
        setTimeout(spawnNext, 4000 + Math.random() * 4000);
      }
      setTimeout(spawnNext, 3000);
    }

    // ── INIT ──
    initProfile();
    const shouldCount = checkLockState();
    if (shouldCount) startCountdown();
    startAutoChat();
    startAutoEmoji();

    setTimeout(() => {
      addChatMsg('System', '#ffd700', `🎉 Welcome to ${profileData?.name}'s stream!`);
    }, 500);

  </script>

</body>
</html>
