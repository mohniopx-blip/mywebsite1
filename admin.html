<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIPLive — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, onSnapshot, orderBy, query,
      addDoc, serverTimestamp, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApXJIZOaoQfSze9myODDs9Y6O2fW_IEwI",
      authDomain: "vip-live-5a1c1.firebaseapp.com",
      projectId: "vip-live-5a1c1",
      storageBucket: "vip-live-5a1c1.firebasestorage.app",
      messagingSenderId: "90875845422",
      appId: "1:90875845422:web:83b8f3d4c3781f44f4f8bf"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ─── All profile IDs (from your website) ───
    const allProfileIds = [
      "g1","g2","g3","g4","g5","g6","g7","g8","g9","g10","g11","g12","g13","g14","g15",
      "l1","l2","l3","l4","l5","l6","l7",
      "c1","c2","c3","c4",
      "y1","y2","y3","y4","y5"
    ];

    const profileNames = {
      g1:"Priya Sharma", g2:"Anika Rao", g3:"Divya Kapoor", g4:"Sneha Verma",
      g5:"Riya Malhotra", g6:"Kavya Singh", g7:"Pooja Gupta", g8:"Meera Joshi",
      g9:"Tanya Bhatia", g10:"Shreya Nair", g11:"Nikita Reddy", g12:"Sonal Mehta",
      g13:"Anjali Pandey", g14:"Komal Iyer", g15:"Simran Khatri",
      l1:"Asha & Prachi", l2:"Ritu & Sameera", l3:"Nisha & Pooja",
      l4:"Disha & Kanika", l5:"Siya & Tia", l6:"Neha & Mansi", l7:"Zara & Priya",
      c1:"Raj & Simran", c2:"Aryan & Riya", c3:"Dev & Priya", c4:"Karan & Asha",
      y1:"Rohan & Kiran", y2:"Siddharth & Jay", y3:"Aakash & Neil",
      y4:"Vikram & Arpit", y5:"Sam & Adi"
    };

    // Store all conversations
    const conversations = {}; // profileId → [{username, message, imgUrl, isAdmin, timestamp}]
    const unreadCount   = {}; // profileId → count
    let   activeProfile = null;
    let   unsubActive   = null;

    // ─── Listen to ALL profiles for new messages ───
    async function startListeningAll() {
      for (const pid of allProfileIds) {
        conversations[pid] = [];
        unreadCount[pid]   = 0;

        const q = query(
          collection(db, "supportChats", pid, "messages"),
          orderBy("timestamp", "asc")
        );

        onSnapshot(q, snap => {
          snap.docChanges().forEach(change => {
            if (change.type === "added") {
              const data = change.doc.data();
              conversations[pid].push(data);
              if (!data.isAdmin) {
                unreadCount[pid]++;
                updateSidebar();
                if (pid === activeProfile) renderChat(pid);
                // notification badge on tab title
                updateTitle();
              } else {
                if (pid === activeProfile) renderChat(pid);
              }
            }
          });
          updateSidebar();
        });
      }
    }

    function updateTitle() {
      const total = Object.values(unreadCount).reduce((a,b) => a+b, 0);
      document.title = total > 0 ? `(${total}) VIPLive Admin` : "VIPLive Admin";
    }

    function updateSidebar() {
      const list = document.getElementById("conv-list");
      if (!list) return;

      // Only show profiles that have messages
      const active = allProfileIds.filter(pid => conversations[pid]?.length > 0);
      // Sort: unread first
      active.sort((a,b) => (unreadCount[b]||0) - (unreadCount[a]||0));

      if (active.length === 0) {
        list.innerHTML = `<div class="no-msgs">Abhi koi message nahi aaya 📭<br><small>Jab user message karega, yahan dikhega</small></div>`;
        return;
      }

      list.innerHTML = active.map(pid => {
        const msgs = conversations[pid] || [];
        const last = msgs[msgs.length - 1];
        const unread = unreadCount[pid] || 0;
        const isActive = pid === activeProfile;
        return `
          <div class="conv-item ${isActive ? 'selected' : ''} ${unread > 0 ? 'has-unread' : ''}"
               onclick="window._openChat('${pid}')">
            <div class="conv-avatar">${pid[0].toUpperCase()}</div>
            <div class="conv-body">
              <div class="conv-top">
                <span class="conv-name">${profileNames[pid] || pid}</span>
                ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
              </div>
              <div class="conv-preview">${last ? (last.isAdmin ? '👑 You: ' : '👤 ') + (last.message || '📸 Screenshot') : ''}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderChat(pid) {
      const chatEl = document.getElementById("chat-msgs");
      const headerEl = document.getElementById("chat-header-name");
      if (!chatEl) return;

      if (headerEl) headerEl.textContent = profileNames[pid] || pid;

      const msgs = conversations[pid] || [];
      chatEl.innerHTML = msgs.map(m => {
        const isAdmin = m.isAdmin;
        const time = m.timestamp?.toDate ? m.timestamp.toDate().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'}) : '';
        return `
          <div class="msg-row ${isAdmin ? 'admin-row' : 'user-row'}">
            <div class="msg-bubble ${isAdmin ? 'admin-bubble' : 'user-bubble'}">
              <div class="msg-sender">${isAdmin ? '👑 Admin' : '👤 ' + (m.username || 'User')}</div>
              ${m.message ? `<div class="msg-text">${escHtml(m.message)}</div>` : ''}
              ${m.imgUrl ? `<img src="${m.imgUrl}" class="msg-img" onclick="window.open('${m.imgUrl}','_blank')" alt="screenshot"/>` : ''}
              <div class="msg-time">${time}</div>
            </div>
          </div>
        `;
      }).join('');
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    window._openChat = function(pid) {
      activeProfile = pid;
      unreadCount[pid] = 0;
      updateSidebar();
      updateTitle();
      renderChat(pid);
      document.getElementById("empty-state").style.display = "none";
      document.getElementById("chat-area").style.display   = "flex";
      document.getElementById("reply-area").style.display  = "flex";
    };

    window._sendReply = async function() {
      if (!activeProfile) return;
      const inp = document.getElementById("reply-input");
      const msg = inp.value.trim();
      if (!msg) return;
      inp.value = "";

      try {
        await addDoc(
          collection(db, "supportChats", activeProfile, "messages"),
          { username: "Admin", message: msg, imgUrl: null, timestamp: serverTimestamp(), isAdmin: true }
        );
        // Also send token if button clicked
      } catch(e) { console.error(e); }
    };

    window._sendToken = async function() {
      if (!activeProfile) return;
      const token = document.getElementById("token-val").value.trim() || "VIP786";
      try {
        await addDoc(
          collection(db, "supportChats", activeProfile, "messages"),
          {
            username: "Admin",
            message: `✅ Payment received! Tumhara VIP Token hai: *${token}* — Enter karke unlock karo 🔓`,
            imgUrl: null,
            timestamp: serverTimestamp(),
            isAdmin: true
          }
        );
      } catch(e) { console.error(e); }
    };

    function escHtml(t) {
      return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ─── ADMIN LOGIN ───
    const ADMIN_PASS = "admin123"; // ← Apna password yahan change karo

    window._adminLogin = function() {
      const pass = document.getElementById("admin-pass").value;
      if (pass === ADMIN_PASS) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-panel").style.display   = "flex";
        startListeningAll();
      } else {
        document.getElementById("login-err").style.display = "block";
        document.getElementById("admin-pass").classList.add("shake");
        setTimeout(() => {
          document.getElementById("admin-pass").classList.remove("shake");
          document.getElementById("login-err").style.display = "none";
        }, 2000);
      }
    };

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("admin-pass").addEventListener("keydown", e => {
        if (e.key === "Enter") window._adminLogin();
      });
      document.getElementById("reply-input")?.addEventListener("keydown", e => {
        if (e.key === "Enter") window._sendReply();
      });
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

    :root {
      --bg: #07070f;
      --card: #0f0f1a;
      --border: rgba(255,45,85,0.15);
      --neon: #ff2d55;
      --gold: #ffd700;
      --green: #00ff88;
      --text: #e8e8f0;
      --muted: #555570;
    }

    body {
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN ── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 28px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 80px rgba(255,45,85,0.08);
    }
    .login-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--neon);
      margin-bottom: 4px;
      letter-spacing: 3px;
    }
    .login-logo span { color: var(--gold); }
    .login-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 24px;
      letter-spacing: 2px;
    }
    #admin-pass {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,45,85,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      letter-spacing: 3px;
      outline: none;
      text-align: center;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    #admin-pass:focus { border-color: var(--neon); }
    #admin-pass.shake { animation: shake 0.4s ease; border-color: var(--neon); }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)}
    }
    .login-btn {
      width: 100%;
      background: var(--neon);
      border: none;
      border-radius: 10px;
      padding: 12px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-btn:active { transform: scale(0.97); }
    #login-err {
      display: none;
      color: var(--neon);
      font-size: 0.78rem;
      margin-top: 10px;
    }

    /* ── HEADER ── */
    .admin-header {
      background: rgba(10,10,20,0.98);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 50;
    }
    .admin-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      font-weight: 900;
      color: var(--neon);
      letter-spacing: 2px;
    }
    .admin-logo span { color: var(--gold); }
    .admin-badge {
      background: rgba(255,45,85,0.15);
      border: 1px solid rgba(255,45,85,0.3);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.65rem;
      color: var(--neon);
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
    }
    .header-right {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .online-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── MAIN PANEL ── */
    #main-panel {
      display: none;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--card);
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 2px;
    }
    #conv-list {
      flex: 1;
      overflow-y: auto;
    }
    #conv-list::-webkit-scrollbar { width: 4px; }
    #conv-list::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .no-msgs {
      padding: 30px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.8;
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
    }
    .conv-item:hover { background: rgba(255,45,85,0.05); }
    .conv-item.selected { background: rgba(255,45,85,0.1); border-left: 2px solid var(--neon); }
    .conv-item.has-unread .conv-name { color: #fff; }

    .conv-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon), #7c2dff);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .conv-body { flex: 1; min-width: 0; }
    .conv-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .conv-name { font-size: 0.82rem; font-weight: 700; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .unread-badge {
      background: var(--neon);
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .conv-preview {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── CHAT PANEL ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
    }
    .empty-icon { font-size: 3rem; }
    .empty-text { font-size: 0.85rem; letter-spacing: 1px; }

    /* Chat header */
    .chat-header {
      padding: 14px 20px;
      background: rgba(15,15,26,0.95);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-header-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon), #7c2dff);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700;
    }
    #chat-header-name {
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.4s infinite;
    }

    /* Messages */
    #chat-area {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #chat-msgs::-webkit-scrollbar { width: 4px; }
    #chat-msgs::-webkit-scrollbar-thumb { background: #222; }

    .msg-row { display: flex; }
    .user-row { justify-content: flex-start; }
    .admin-row { justify-content: flex-end; }

    .msg-bubble {
      max-width: 75%;
      border-radius: 12px;
      padding: 10px 14px;
    }
    .user-bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-left-radius: 3px;
    }
    .admin-bubble {
      background: rgba(255,45,85,0.12);
      border: 1px solid rgba(255,45,85,0.2);
      border-bottom-right-radius: 3px;
    }
    .msg-sender {
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 700;
    }
    .admin-bubble .msg-sender { color: var(--neon); }
    .msg-text { font-size: 0.85rem; line-height: 1.5; }
    .msg-img {
      width: 120px; height: 80px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 6px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.2s;
    }
    .msg-img:hover { transform: scale(1.05); }
    .msg-time { font-size: 0.62rem; color: var(--muted); margin-top: 4px; text-align: right; }

    /* ── REPLY AREA ── */
    #reply-area {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(10,10,20,0.95);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* Quick token send */
    .token-quick {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(0,255,136,0.05);
      border: 1px solid rgba(0,255,136,0.15);
      border-radius: 10px;
    }
    .token-quick-label {
      font-size: 0.72rem;
      color: var(--green);
      font-weight: 700;
      white-space: nowrap;
    }
    #token-val {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 6px;
      padding: 5px 10px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      letter-spacing: 2px;
      outline: none;
    }
    .send-token-btn {
      background: var(--green);
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      color: #000;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .send-token-btn:hover { opacity: 0.85; }

    /* Reply input */
    .reply-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #reply-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 10px 16px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #reply-input:focus { border-color: var(--neon); }
    #reply-input::placeholder { color: var(--muted); }
    .reply-btn {
      background: var(--neon);
      border: none;
      border-radius: 24px;
      padding: 10px 20px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .reply-btn:hover { opacity: 0.85; }
    .reply-btn:active { transform: scale(0.97); }

    /* responsive */
    @media(max-width: 600px) {
      .sidebar { width: 220px; }
    }
    @media(max-width: 440px) {
      #main-panel { flex-direction: column; }
      .sidebar { width: 100%; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
      body { overflow: auto; height: auto; }
    }
  </style>
</head>
<body>

<!-- ══════ LOGIN SCREEN ══════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">VIP<span>LIVE</span></div>
    <div class="login-sub">ADMIN PANEL</div>
    <input type="password" id="admin-pass" placeholder="Password daalo"/>
    <button class="login-btn" onclick="window._adminLogin()">🔐 LOGIN</button>
    <div id="login-err">❌ Galat password!</div>
  </div>
</div>

<!-- ══════ HEADER ══════ -->
<div class="admin-header">
  <div class="admin-logo">VIP<span>LIVE</span></div>
  <div class="admin-badge">ADMIN</div>
  <div class="header-right">
    <span class="online-dot"></span>LIVE
  </div>
</div>

<!-- ══════ MAIN PANEL ══════ -->
<div id="main-panel">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">📨 USER MESSAGES</div>
    <div id="conv-list">
      <div class="no-msgs">Loading... ⏳</div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel">

    <!-- Empty state -->
    <div id="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-text">Koi conversation select karo</div>
    </div>

    <!-- Chat header -->
    <div class="chat-header" id="chat-header" style="display:none">
      <div class="chat-header-avatar">U</div>
      <div>
        <div id="chat-header-name">User</div>
        <div style="font-size:0.65rem;color:var(--muted)">Support Chat</div>
      </div>
      <div class="live-dot" style="margin-left:auto"></div>
    </div>

    <!-- Messages -->
    <div id="chat-area">
      <div id="chat-msgs"></div>
    </div>

    <!-- Reply area -->
    <div id="reply-area">
      <!-- Token Quick Send -->
      <div class="token-quick">
        <span class="token-quick-label">🏆 TOKEN BHEJO:</span>
        <input type="text" id="token-val" value="VIP786" placeholder="Token code"/>
        <button class="send-token-btn" onclick="window._sendToken()">⚡ TOKEN SEND</button>
      </div>

      <!-- Normal reply -->
      <div class="reply-row">
        <input type="text" id="reply-input" placeholder="Reply type karo..."/>
        <button class="reply-btn" onclick="window._sendReply()">📤 SEND</button>
      </div>
    </div>

  </div>
</div>

<script>
  // Show chat header when chat opens
  const origOpen = window._openChat;
  window._openChat = function(pid) {
    origOpen(pid);
    document.getElementById("chat-header").style.display = "flex";
  };

  // Enter key on reply input
  document.getElementById("reply-input")?.addEventListener("keydown", e => {
    if (e.key === "Enter") window._sendReply();
  });
</script>

</body>
</html>
