<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveStream VIP</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --red:   #ff2d55;
      --gold:  #ffd700;
      --dark:  #0a0a0f;
      --card:  #12121a;
      --border:#1e1e2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #0a0a0f 0%, #1a0a1a 50%, #0a0a0f 100%);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .live-dot {
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,45,85,0.7); }
      50%       { box-shadow: 0 0 0 6px rgba(255,45,85,0); }
    }

    .stream-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      position: relative;
    }
    .stream-card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: var(--red);
      box-shadow: 0 8px 32px rgba(255,45,85,0.25);
    }

    .thumb-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #0d0d18;
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .stream-card:hover .thumb-wrap img { transform: scale(1.07); }

    .badge-live {
      position: absolute;
      top: 8px; left: 8px;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .badge-viewers {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      color: #ccc;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0);
      transition: background 0.25s;
    }
    .stream-card:hover .play-overlay { background: rgba(0,0,0,0.35); }
    .play-icon {
      width: 40px; height: 40px;
      background: rgba(255,45,85,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.25s, transform 0.25s;
    }
    .stream-card:hover .play-icon { opacity: 1; transform: scale(1); }

    .card-info {
      padding: 10px 12px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), #7928ca);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      border: 2px solid var(--red);
    }
    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-sub { font-size: 11px; color: #666; margin-top: 1px; }

    .stream-card {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* User avatar button in header */
    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,45,85,0.1);
      border: 1px solid rgba(255,45,85,0.25);
      border-radius: 20px;
      padding: 4px 10px 4px 5px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .user-pill:hover { background: rgba(255,45,85,0.18); }
    .user-pill-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), #7928ca);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }
    .user-pill-name { font-size: 12px; font-weight: 600; color: #e0e0e0; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Dropdown menu */
    .user-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-width: 160px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      overflow: hidden;
      display: none;
      z-index: 100;
    }
    .user-dropdown.open { display: block; animation: dropIn 0.2s ease; }
    @keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .dropdown-item {
      padding: 10px 14px;
      font-size: 13px;
      color: #bbb;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dropdown-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
    .dropdown-item.danger:hover { background: rgba(255,45,85,0.08); color: var(--red); }

    /* Page loading overlay */
    #page-loader {
      position: fixed;
      inset: 0;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.4s;
    }
    #page-loader.fade-out { opacity: 0; pointer-events: none; }
    .loader-logo { font-family: 'Bebas Neue', cursive; font-size: 42px; color: var(--red); letter-spacing: 3px; animation: logoPulse 1s ease-in-out infinite; }
    .loader-logo span { color: var(--gold); }
    @keyframes logoPulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Page loader (shown while checking auth) -->
  <div id="page-loader">
    <div class="loader-logo">LIVE<span>VIP</span></div>
  </div>

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="px-4 py-3">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span style="font-family:'Bebas Neue',cursive; font-size:26px; color:#ff2d55; letter-spacing:2px;">
          LIVE<span style="color:#ffd700;">VIP</span>
        </span>
      </div>

      <div class="flex items-center gap-3">
        <span class="flex items-center gap-1 text-xs text-gray-400">
          <span class="live-dot"></span> 15 LIVE NOW
        </span>

        <!-- User pill with dropdown -->
        <div style="position:relative;">
          <div class="user-pill" id="user-pill" onclick="toggleDropdown()">
            <div class="user-pill-avatar" id="header-avatar">?</div>
            <span class="user-pill-name" id="header-name">User</span>
          </div>
          <div class="user-dropdown" id="user-dropdown">
            <div class="dropdown-item" style="font-size:11px;color:#444;cursor:default;padding:8px 14px;" id="dropdown-email">—</div>
            <div style="height:1px;background:var(--border);"></div>
            <div class="dropdown-item danger" onclick="handleLogout()">🚪 Logout</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════ MAIN ═══════════ -->
  <main class="max-w-7xl mx-auto px-4 py-6">
    <div class="mb-5 flex items-center gap-3">
      <span class="live-dot"></span>
      <h1 style="font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:2px; color:#e0e0e0;">
        LIVE STREAMS
      </h1>
      <span class="text-xs text-gray-600 ml-auto">Click to watch</span>
    </div>

    <div id="grid-container"
         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4">
    </div>
  </main>

  <!-- ═══════════ JAVASCRIPT ═══════════ -->
  <script>
    // ── Firebase Init ──
    const firebaseConfig = {
      apiKey: "AIzaSyApXJIZOaoQfSze9myODDs9Y6O2fW_IEwI",
      authDomain: "vip-live-5a1c1.firebaseapp.com",
      projectId: "vip-live-5a1c1",
      storageBucket: "vip-live-5a1c1.firebasestorage.app",
      messagingSenderId: "90875845422",
      appId: "1:90875845422:web:83b8f3d4c3781f44f4f8bf",
      measurementId: "G-F286K080R8"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ── Auth Guard ──
    auth.onAuthStateChanged((user) => {
      const loader = document.getElementById('page-loader');
      if (!user) {
        // Not logged in → redirect to auth
        window.location.href = 'auth.html';
        return;
      }
      // Logged in — update UI
      const displayName = user.displayName || user.email.split('@')[0];
      const initial = displayName.charAt(0).toUpperCase();
      document.getElementById('header-avatar').textContent = initial;
      document.getElementById('header-name').textContent   = displayName;
      document.getElementById('dropdown-email').textContent = user.email;

      // Hide loader
      loader.classList.add('fade-out');
      setTimeout(() => loader.style.display = 'none', 400);
    });

    // ── Logout ──
    async function handleLogout() {
      await auth.signOut();
      window.location.href = 'auth.html';
    }

    // ── Dropdown toggle ──
    function toggleDropdown() {
      document.getElementById('user-dropdown').classList.toggle('open');
    }
    document.addEventListener('click', (e) => {
      if (!document.getElementById('user-pill').contains(e.target)) {
        document.getElementById('user-dropdown').classList.remove('open');
      }
    });

    // ════════════════════════════════════════════════
    // PROFILES & GRID (unchanged from original)
    // ════════════════════════════════════════════════
    const profiles = [
      { id: 1,  name: "Aria Moon",     img: "images/p1.jpg",  video: "videos/v1.mp4",  viewers: 2341 },
      { id: 2,  name: "ZenoBoy",       img: "images/p2.jpg",  video: "videos/v2.mp4",  viewers: 891  },
      { id: 3,  name: "StarlaXO",      img: "images/p3.jpg",  video: "videos/v3.mp4",  viewers: 4120 },
      { id: 4,  name: "KoiDream",      img: "images/p4.jpg",  video: "videos/v4.mp4",  viewers: 678  },
      { id: 5,  name: "NovaBeat",      img: "images/p5.jpg",  video: "videos/v5.mp4",  viewers: 1530 },
      { id: 6,  name: "LunaVibes",     img: "images/p6.jpg",  video: "videos/v6.mp4",  viewers: 3207 },
      { id: 7,  name: "Phantom_K",     img: "images/p7.jpg",  video: "videos/v7.mp4",  viewers: 510  },
      { id: 8,  name: "RioStar",       img: "images/p8.jpg",  video: "videos/v8.mp4",  viewers: 2905 },
      { id: 9,  name: "MystiQ",        img: "images/p9.jpg",  video: "videos/v9.mp4",  viewers: 1100 },
      { id: 10, name: "VelvetTone",    img: "images/p10.jpg", video: "videos/v10.mp4", viewers: 765  },
      { id: 11, name: "AceWild",       img: "images/p11.jpg", video: "videos/v11.mp4", viewers: 4400 },
      { id: 12, name: "SkyPulse",      img: "images/p12.jpg", video: "videos/v12.mp4", viewers: 320  },
      { id: 13, name: "EmberGlow",     img: "images/p13.jpg", video: "videos/v13.mp4", viewers: 1890 },
      { id: 14, name: "TigerNeon",     img: "images/p14.jpg", video: "videos/v14.mp4", viewers: 2200 },
      { id: 15, name: "CrystalPop",    img: "images/p15.jpg", video: "videos/v15.mp4", viewers: 670  },
    ];

    function formatViewers(n) {
      return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : n.toString();
    }

    function openStream(profile) {
      localStorage.setItem('selectedProfile', JSON.stringify(profile));
      window.location.href = 'live.html';
    }

    function buildGrid() {
      const container = document.getElementById('grid-container');
      container.innerHTML = '';
      profiles.forEach((p, index) => {
        const initial = p.name.charAt(0).toUpperCase();
        const card = document.createElement('div');
        card.className = 'stream-card';
        card.style.animationDelay = `${index * 60}ms`;
        card.innerHTML = `
          <div class="thumb-wrap">
            <img src="${p.img}" alt="${p.name}" loading="lazy"
                 onerror="this.src='https://picsum.photos/seed/${p.id}/320/180'" />
            <div class="badge-live">
              <span class="live-dot" style="width:6px;height:6px;"></span>
              LIVE
            </div>
            <div class="badge-viewers">👁 ${formatViewers(p.viewers)}</div>
            <div class="play-overlay">
              <div class="play-icon">
                <svg width="14" height="16" viewBox="0 0 14 16" fill="white">
                  <path d="M0 0L14 8L0 16V0Z"/>
                </svg>
              </div>
            </div>
          </div>
          <div class="card-info">
            <div class="avatar">${initial}</div>
            <div style="overflow:hidden;">
              <div class="card-name">${p.name}</div>
              <div class="card-sub">Tap to watch live</div>
            </div>
          </div>
        `;
        card.addEventListener('click', () => openStream(p));
        container.appendChild(card);
      });
    }

    buildGrid();
  </script>

</body>
</html>
