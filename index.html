<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIP Live – Premium Streams</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #eee;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
    }

    /* ═══ HEADER ═══ */
    .site-header {
      background: #111;
      border-bottom: 2px solid #c0392b;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.35rem;
      font-weight: 900;
      color: #e74c3c;
      letter-spacing: 2px;
    }
    .logo span { color: #f1c40f; }
    .live-now-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: #aaa;
    }
    .green-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #2ecc71;
      animation: blink-dot 1.4s infinite;
    }
    @keyframes blink-dot {
      0%,100%{ opacity:1; } 50%{ opacity:0.3; }
    }

    /* ═══ TAB BAR ═══ */
    .tab-bar {
      background: #1a1a1a;
      display: flex;
      position: sticky;
      top: 50px;
      z-index: 190;
      border-bottom: 2px solid #2a2a2a;
    }
    .tab-item {
      flex: 1;
      text-align: center;
      padding: 14px 4px 11px;
      font-size: 1rem;
      font-weight: 700;
      color: #777;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      font-family: 'Rajdhani', sans-serif;
    }
    .tab-item:hover { color: #ccc; }
    .tab-item.active {
      color: #fff;
      border-bottom-color: #e74c3c;
    }

    /* ═══ SECTION HEADING ═══ */
    .sec-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 14px 8px;
    }
    .sec-head-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
    }
    .sec-head-tag {
      font-size: 0.6rem;
      border: 1px solid;
      border-radius: 20px;
      padding: 2px 8px;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px;
    }
    .tag-g  { color: #ff6b9d; border-color: #ff6b9d; }
    .tag-l  { color: #b76eff; border-color: #b76eff; }
    .tag-c  { color: #ff9f43; border-color: #ff9f43; }
    .tag-y  { color: #48dbfb; border-color: #48dbfb; }
    .sec-line {
      flex:1; height:1px;
      background: linear-gradient(90deg, rgba(231,76,60,0.4), transparent);
    }

    /* ═══ GRID ═══ */
    .grid-wrap { padding: 0 10px 20px; }
    .stream-grid {
      display: grid;
      gap: 9px;
      grid-template-columns: repeat(3, 1fr);
    }
    @media(min-width:540px){ .stream-grid{ grid-template-columns: repeat(4,1fr); } }
    @media(min-width:900px){ .stream-grid{ grid-template-columns: repeat(5,1fr); } }

    /* ═══ STREAM CARD ═══ */
    .stream-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      background: #1a1a22;
      aspect-ratio: 9/14;
      border: 1px solid rgba(255,255,255,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    .stream-card:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 6px 24px rgba(231,76,60,0.3);
    }
    .stream-card:active { transform: scale(0.97); }
    .stream-card img {
      width:100%; height:100%;
      object-fit: cover; display: block;
    }
    .card-grad {
      position: absolute; inset:0;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 55%);
    }

    /* LIVE badge blinks */
    .live-pill {
      position: absolute;
      top: 6px; left: 6px;
      background: #e74c3c;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 0.5rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 1.5px;
      animation: live-blink 1.3s infinite;
      z-index: 4;
    }
    @keyframes live-blink {
      0%,100%{ opacity:1; box-shadow:0 0 7px rgba(231,76,60,0.9); }
      50%    { opacity:0.4; box-shadow:none; }
    }

    /* Offline */
    .offline-cover {
      position: absolute; inset:0;
      background: rgba(0,0,0,0.72);
      display: flex; align-items:center; justify-content:center;
      z-index: 8;
    }
    .offline-label {
      font-family:'Orbitron',monospace;
      font-size:0.6rem; color:#555; letter-spacing:2px;
    }

    /* Card info */
    .card-info {
      position: absolute;
      bottom:0; left:0; right:0;
      padding: 7px 8px;
      z-index: 5;
    }
    .card-name {
      font-size: 0.78rem; font-weight:700; color:#fff;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    }
    .card-views {
      font-size: 0.68rem; color: #f1c40f;
      display:flex; align-items:center; gap:3px;
      margin-top:1px;
    }

    footer {
      text-align:center; padding:24px 16px;
      font-size:0.72rem; color:#333; letter-spacing:1px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="site-header">
  <div class="logo">VIP<span>LIVE</span></div>
  <div class="live-now-badge">
    <div class="green-dot"></div>
    <span id="total-live">31 LIVE NOW</span>
  </div>
</div>

<!-- TAB BAR — sticky below header -->
<div class="tab-bar" id="tab-bar">
  <div class="tab-item active" data-sec="sec-girls">Girls</div>
  <div class="tab-item"        data-sec="sec-lesbians">Lesbians</div>
  <div class="tab-item"        data-sec="sec-couples">Couples</div>
  <div class="tab-item"        data-sec="sec-gay">Gay</div>
</div>

<main>

  <!-- SECTION 1: GIRLS -->
  <div id="sec-girls">
    <div class="sec-head">
      <span style="font-size:1.1rem">💋</span>
      <span class="sec-head-title">Girls</span>
      <span class="sec-head-tag tag-g">HOT</span>
      <div class="sec-line"></div>
    </div>
    <div class="grid-wrap">
      <div class="stream-grid" id="grid-girls"></div>
    </div>
  </div>

  <!-- SECTION 2: LESBIANS -->
  <div id="sec-lesbians">
    <div class="sec-head">
      <span style="font-size:1.1rem">🌸</span>
      <span class="sec-head-title">Lesbians</span>
      <span class="sec-head-tag tag-l">NEW</span>
      <div class="sec-line"></div>
    </div>
    <div class="grid-wrap">
      <div class="stream-grid" id="grid-lesbians"></div>
    </div>
  </div>

  <!-- SECTION 3: COUPLES -->
  <div id="sec-couples">
    <div class="sec-head">
      <span style="font-size:1.1rem">💑</span>
      <span class="sec-head-title">Couples</span>
      <span class="sec-head-tag tag-c">POPULAR</span>
      <div class="sec-line"></div>
    </div>
    <div class="grid-wrap">
      <div class="stream-grid" id="grid-couples"></div>
    </div>
  </div>

  <!-- SECTION 4: GAY -->
  <div id="sec-gay">
    <div class="sec-head">
      <span style="font-size:1.1rem">🏳️‍🌈</span>
      <span class="sec-head-title">Gay</span>
      <span class="sec-head-tag tag-y">TRENDING</span>
      <div class="sec-line"></div>
    </div>
    <div class="grid-wrap">
      <div class="stream-grid" id="grid-gay"></div>
    </div>
  </div>

</main>

<footer>© 2024 VIPLive · Premium Content Platform · 18+ Only</footer>

<script>
// ════════ PROFILES ════════
// offline: true → stream goes offline instantly (kill switch)
const profiles = {
  girls: [
    { id:"g1",  name:"Priya Sharma",    img:"images/g1.jpg",  video:"v1.mp4",  offline:false },
    { id:"g2",  name:"Anika Rao",       img:"images/g2.jpg",  video:"videos/v2.mp4",  offline:false },
    { id:"g3",  name:"Divya Kapoor",    img:"images/g3.jpg",  video:"videos/v3.mp4",  offline:false },
    { id:"g4",  name:"Sneha Verma",     img:"images/g4.jpg",  video:"videos/v4.mp4",  offline:false },
    { id:"g5",  name:"Riya Malhotra",   img:"images/g5.jpg",  video:"videos/v5.mp4",  offline:false },
    { id:"g6",  name:"Kavya Singh",     img:"images/g6.jpg",  video:"videos/v6.mp4",  offline:false },
    { id:"g7",  name:"Pooja Gupta",     img:"images/g7.jpg",  video:"videos/v7.mp4",  offline:false },
    { id:"g8",  name:"Meera Joshi",     img:"images/g8.jpg",  video:"videos/v8.mp4",  offline:false },
    { id:"g9",  name:"Tanya Bhatia",    img:"images/g9.jpg",  video:"videos/v9.mp4",  offline:false },
    { id:"g10", name:"Shreya Nair",     img:"images/g10.jpg", video:"videos/v10.mp4", offline:false },
    { id:"g11", name:"Nikita Reddy",    img:"images/g11.jpg", video:"videos/v11.mp4", offline:false },
    { id:"g12", name:"Sonal Mehta",     img:"images/g12.jpg", video:"videos/v12.mp4", offline:false },
    { id:"g13", name:"Anjali Pandey",   img:"images/g13.jpg", video:"videos/v13.mp4", offline:false },
    { id:"g14", name:"Komal Iyer",      img:"images/g14.jpg", video:"videos/v14.mp4", offline:false },
    { id:"g15", name:"Simran Khatri",   img:"images/g15.jpg", video:"videos/v15.mp4", offline:false },
  ],
  lesbians: [
    { id:"l1", name:"Asha & Prachi",  img:"l1.jpg", video:"videos/l1.mp4", offline:false },
    { id:"l2", name:"Ritu & Sameera", img:"images/l2.jpg", video:"videos/l2.mp4", offline:false },
    { id:"l3", name:"Nisha & Pooja",  img:"images/l3.jpg", video:"videos/l3.mp4", offline:false },
    { id:"l4", name:"Disha & Kanika", img:"images/l4.jpg", video:"videos/l4.mp4", offline:false },
    { id:"l5", name:"Siya & Tia",     img:"images/l5.jpg", video:"videos/l5.mp4", offline:false },
    { id:"l6", name:"Neha & Mansi",   img:"images/l6.jpg", video:"videos/l6.mp4", offline:false },
    { id:"l7", name:"Zara & Priya",   img:"images/l7.jpg", video:"videos/l7.mp4", offline:false },
  ],
  couples: [
    { id:"c1", name:"Raj & Simran",  img:"images/c1.jpg", video:"videos/c1.mp4", offline:false },
    { id:"c2", name:"Aryan & Riya",  img:"images/c2.jpg", video:"videos/c2.mp4", offline:false },
    { id:"c3", name:"Dev & Priya",   img:"images/c3.jpg", video:"videos/c3.mp4", offline:false },
    { id:"c4", name:"Karan & Asha",  img:"images/c4.jpg", video:"videos/c4.mp4", offline:false },
  ],
  gay: [
    { id:"y1", name:"Rohan & Kiran",   img:"images/y1.jpg", video:"videos/y1.mp4", offline:false },
    { id:"y2", name:"Siddharth & Jay", img:"images/y2.jpg", video:"videos/y2.mp4", offline:false },
    { id:"y3", name:"Aakash & Neil",   img:"images/y3.jpg", video:"videos/y3.mp4", offline:false },
    { id:"y4", name:"Vikram & Arpit",  img:"images/y4.jpg", video:"videos/y4.mp4", offline:false },
    { id:"y5", name:"Sam & Adi",       img:"images/y5.jpg", video:"videos/y5.mp4", offline:false },
  ],
};

// ════════ VIEWER COUNTS ════════
const vc = {};

function initV(id, isGay) {
  return isGay
    ? Math.floor(Math.random() * 6) + 5    // Gay: 5–10
    : Math.floor(Math.random() * 81) + 20; // Others: 20–100
}

// ════════ BUILD GRID ════════
function buildGrid(gridId, items, cat) {
  const el = document.getElementById(gridId);
  el.innerHTML = "";
  const isGay = cat === "Gay";

  items.forEach(p => {
    if (!vc[p.id]) vc[p.id] = initV(p.id, isGay);

    const card = document.createElement("div");
    card.className = "stream-card";
    card.innerHTML = `
      <img src="${p.img}" alt="${p.name}"
        onerror="this.style.background='#181828';this.removeAttribute('src')"
        loading="lazy"/>
      <div class="card-grad"></div>
      ${p.offline ? '' : '<div class="live-pill">LIVE</div>'}
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-views">👁 <span id="v-${p.id}">${vc[p.id]}</span></div>
      </div>
      ${p.offline ? '<div class="offline-cover"><span class="offline-label">⛔ OFFLINE</span></div>' : ''}
    `;

    if (!p.offline) {
      card.addEventListener("click", () => {
        localStorage.setItem("vip_profile", JSON.stringify({
          id:p.id, name:p.name, img:p.img, video:p.video, category:cat
        }));
        window.location.href = "live.html";
      });
    }
    el.appendChild(card);
  });
}

buildGrid("grid-girls",    profiles.girls,    "Girls");
buildGrid("grid-lesbians", profiles.lesbians, "Lesbians");
buildGrid("grid-couples",  profiles.couples,  "Couples");
buildGrid("grid-gay",      profiles.gay,      "Gay");

// Live count
const total = Object.values(profiles).flat().filter(p=>!p.offline).length;
document.getElementById("total-live").textContent = `${total} LIVE NOW`;

// ════════ VIEWER UPDATE every 3s ════════
setInterval(() => {
  Object.keys(vc).forEach(id => {
    const el = document.getElementById(`v-${id}`);
    if (!el) return;
    const isGay = id.startsWith("y");
    let v = vc[id] + Math.floor(Math.random()*5) - 2;
    v = isGay ? Math.max(5,Math.min(10,v)) : Math.max(20,Math.min(100,v));
    vc[id] = v;
    el.textContent = v;
  });
}, 3000);

// ════════ TAB BAR ════════
const tabs = document.querySelectorAll(".tab-item");
const OFFSET = 112; // header + tabbar height

tabs.forEach(tab => {
  tab.addEventListener("click", () => {
    const sec = document.getElementById(tab.dataset.sec);
    if (!sec) return;
    const top = sec.getBoundingClientRect().top + window.scrollY - OFFSET;
    window.scrollTo({ top, behavior: "smooth" });
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
  });
});

// Auto highlight on scroll
const secIds = ["sec-girls","sec-lesbians","sec-couples","sec-gay"];
window.addEventListener("scroll", () => {
  let cur = "sec-girls";
  secIds.forEach(id => {
    const el = document.getElementById(id);
    if (el && window.scrollY + OFFSET + 5 >= el.offsetTop) cur = id;
  });
  tabs.forEach(t => t.classList.remove("active"));
  const found = [...tabs].find(t => t.dataset.sec === cur);
  if (found) found.classList.add("active");
}, { passive:true });
</script>
</body>
</html>
