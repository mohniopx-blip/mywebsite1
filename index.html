<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveStream VIP</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Bebas Neue (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Variables & Base ── */
    :root {
      --red:   #ff2d55;
      --gold:  #ffd700;
      --dark:  #0a0a0f;
      --card:  #12121a;
      --border:#1e1e2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Animated gradient header bg ── */
    header {
      background: linear-gradient(135deg, #0a0a0f 0%, #1a0a1a 50%, #0a0a0f 100%);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    /* ── LIVE badge pulse ── */
    .live-dot {
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,45,85,0.7); }
      50%       { box-shadow: 0 0 0 6px rgba(255,45,85,0); }
    }

    /* ── Grid card ── */
    .stream-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
      position: relative;
    }
    .stream-card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: var(--red);
      box-shadow: 0 8px 32px rgba(255,45,85,0.25);
    }

    /* ── Thumbnail container ── */
    .thumb-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #0d0d18;
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .stream-card:hover .thumb-wrap img { transform: scale(1.07); }

    /* ── Overlay badges ── */
    .badge-live {
      position: absolute;
      top: 8px; left: 8px;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .badge-viewers {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      color: #ccc;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0);
      transition: background 0.25s;
    }
    .stream-card:hover .play-overlay { background: rgba(0,0,0,0.35); }
    .play-icon {
      width: 40px; height: 40px;
      background: rgba(255,45,85,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.25s, transform 0.25s;
    }
    .stream-card:hover .play-icon { opacity: 1; transform: scale(1); }

    /* ── Card info ── */
    .card-info {
      padding: 10px 12px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), #7928ca);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      border: 2px solid var(--red);
    }
    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-sub {
      font-size: 11px;
      color: #666;
      margin-top: 1px;
    }

    /* ── Staggered fade-in ── */
    .stream-card {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="px-4 py-3">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <!-- Logo -->
      <div class="flex items-center gap-2">
        <span style="font-family:'Bebas Neue',cursive; font-size:26px; color:#ff2d55; letter-spacing:2px;">
          LIVE<span style="color:#ffd700;">VIP</span>
        </span>
      </div>

      <!-- Right side badges -->
      <div class="flex items-center gap-3">
        <span class="flex items-center gap-1 text-xs text-gray-400">
          <span class="live-dot"></span> 15 LIVE NOW
        </span>
        <span style="background:linear-gradient(135deg,#ff2d55,#7928ca);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;">
          👑 VIP
        </span>
      </div>
    </div>
  </header>
  <div id="mainContent" style="display:none;">

  <!-- ═══════════ MAIN ═══════════ -->
  <main class="max-w-7xl mx-auto px-4 py-6">

    <!-- Section title -->
    <div class="mb-5 flex items-center gap-3">
      <span class="live-dot"></span>
      <h1 style="font-family:'Bebas Neue',cursive; font-size:22px; letter-spacing:2px; color:#e0e0e0;">
        LIVE STREAMS
      </h1>
      <span class="text-xs text-gray-600 ml-auto">Click to watch</span>
    </div>

    <!-- 
      ════════════════════════════════
      GRID CONTAINER
      JS will inject 15 cards here
      ════════════════════════════════
    -->
    <div id="grid-container"
         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4">
      <!-- Cards injected by JavaScript below -->
    </div>

  </main>
  </div>

  <!-- ═══════════ JAVASCRIPT ═══════════ -->
  <script>
    // ════════════════════════════════════════════════
    // PROFILES ARRAY — 15 fake streamer profiles
    // Each has: id, name, img (path), video (path)
    // ════════════════════════════════════════════════
    const profiles = [
      { id: 1,  name: "Aria Moon",     img: "images/p1.jpg",  video: "videos/v1.mp4",  viewers: 2341 },
      { id: 2,  name: "ZenoBoy",       img: "images/p2.jpg",  video: "videos/v2.mp4",  viewers: 891  },
      { id: 3,  name: "StarlaXO",      img: "images/p3.jpg",  video: "videos/v3.mp4",  viewers: 4120 },
      { id: 4,  name: "KoiDream",      img: "images/p4.jpg",  video: "videos/v4.mp4",  viewers: 678  },
      { id: 5,  name: "NovaBeat",      img: "images/p5.jpg",  video: "videos/v5.mp4",  viewers: 1530 },
      { id: 6,  name: "LunaVibes",     img: "images/p6.jpg",  video: "videos/v6.mp4",  viewers: 3207 },
      { id: 7,  name: "Phantom_K",     img: "images/p7.jpg",  video: "videos/v7.mp4",  viewers: 510  },
      { id: 8,  name: "RioStar",       img: "images/p8.jpg",  video: "videos/v8.mp4",  viewers: 2905 },
      { id: 9,  name: "MystiQ",        img: "images/p9.jpg",  video: "videos/v9.mp4",  viewers: 1100 },
      { id: 10, name: "VelvetTone",    img: "images/p10.jpg", video: "videos/v10.mp4", viewers: 765  },
      { id: 11, name: "AceWild",       img: "images/p11.jpg", video: "videos/v11.mp4", viewers: 4400 },
      { id: 12, name: "SkyPulse",      img: "images/p12.jpg", video: "videos/v12.mp4", viewers: 320  },
      { id: 13, name: "EmberGlow",     img: "images/p13.jpg", video: "videos/v13.mp4", viewers: 1890 },
      { id: 14, name: "TigerNeon",     img: "images/p14.jpg", video: "videos/v14.mp4", viewers: 2200 },
      { id: 15, name: "CrystalPop",    img: "images/p15.jpg", video: "videos/v15.mp4", viewers: 670  },
    ];

    // ════════════════════════════════════════════════
    // FORMAT viewer count: 4120 → "4.1K"
    // ════════════════════════════════════════════════
    function formatViewers(n) {
      return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : n.toString();
    }

    // ════════════════════════════════════════════════
    // HANDLE CARD CLICK
    // Save profile to localStorage → go to live.html
    // ════════════════════════════════════════════════
    function openStream(profile) {
      localStorage.setItem('selectedProfile', JSON.stringify(profile));
      window.location.href = 'live.html';
    }

    // ════════════════════════════════════════════════
    // BUILD GRID
    // Clear container first (prevents duplicates)
    // Then inject one card per profile
    // ════════════════════════════════════════════════
    function buildGrid() {
      const container = document.getElementById('grid-container');
      container.innerHTML = ''; // 🔒 Prevent duplicate cards

      profiles.forEach((p, index) => {
        // Get first letter of name for avatar initials
        const initial = p.name.charAt(0).toUpperCase();

        // Build card HTML
        const card = document.createElement('div');
        card.className = 'stream-card';
        card.style.animationDelay = `${index * 60}ms`; // staggered entrance

        card.innerHTML = `
          <!-- Thumbnail -->
          <div class="thumb-wrap">
            <img
              src="${p.img}"
              alt="${p.name}"
              loading="lazy"
              onerror="this.src='https://picsum.photos/seed/${p.id}/320/180'"
            />
            <!-- LIVE badge -->
            <div class="badge-live">
              <span class="live-dot" style="width:6px;height:6px;"></span>
              LIVE
            </div>
            <!-- Viewer count -->
            <div class="badge-viewers">👁 ${formatViewers(p.viewers)}</div>
            <!-- Hover play icon -->
            <div class="play-overlay">
              <div class="play-icon">
                <svg width="14" height="16" viewBox="0 0 14 16" fill="white">
                  <path d="M0 0L14 8L0 16V0Z"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Card Info -->
          <div class="card-info">
            <div class="avatar">${initial}</div>
            <div style="overflow:hidden;">
              <div class="card-name">${p.name}</div>
              <div class="card-sub">Tap to watch live</div>
            </div>
          </div>
        `;

        // Click → save & redirect
        card.addEventListener('click', () => openStream(p));

        container.appendChild(card);
      });
    }

    // ════════════════════════════════════════════════
    // INIT — run when page loads
    // ════════════════════════════════════════════════  
  </script>
  <!-- Firebase SDK -->

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 TERA CONFIG (same jo tune diya)
const firebaseConfig = {
  apiKey: "AIzaSyApXJIZOaoQfSze9myODDs9Y6O2fW_IEwI",
  authDomain: "vip-live-5a1c1.firebaseapp.com",
  projectId: "vip-live-5a1c1",
  storageBucket: "vip-live-5a1c1.firebasestorage.app",
  messagingSenderId: "90875845422",
  appId: "1:90875845422:web:83b8f3d4c3781f44f4f8bf",
  measurementId: "G-F286K080R8"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


// ✅ SIGNUP FUNCTION
window.signup = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("Signup Success"))
    .catch(err => alert(err.message));

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => alert("Login Success"))
    .catch(err => alert(err.message));
};

// ✅ LOGIN CHECK (IMPORTANT)
onAuthStateChanged(auth, user => {
  if(user){
    document.getElementById("authBox").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    buildGrid(); // 👈 tera function
  }
});

</script>
</body>
</html>
