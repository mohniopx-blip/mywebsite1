<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIP Live – Premium Streams</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #eee; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }

    .site-header { background:#111; border-bottom:2px solid #c0392b; padding:8px 14px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
    .logo { font-family:'Orbitron',monospace; font-size:1.2rem; font-weight:900; color:#e74c3c; letter-spacing:2px; }
    .logo span { color:#f1c40f; }
    .live-now-badge { display:flex; align-items:center; gap:5px; font-size:0.72rem; color:#aaa; }
    .green-dot { width:7px; height:7px; border-radius:50%; background:#2ecc71; animation:blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .tab-bar { background:#1a1a1a; display:flex; position:sticky; top:50px; z-index:190; border-bottom:2px solid #2a2a2a; }
    .tab-item { flex:1; text-align:center; padding:14px 4px 11px; font-size:1rem; font-weight:700; color:#777; cursor:pointer; border-bottom:3px solid transparent; transition:color 0.15s,border-color 0.15s; font-family:'Rajdhani',sans-serif; }
    .tab-item.active { color:#fff; border-bottom-color:#e74c3c; }

    .sec-head { display:flex; align-items:center; gap:10px; padding:14px 14px 8px; }
    .sec-head-title { font-family:'Orbitron',monospace; font-size:0.9rem; font-weight:700; color:#fff; letter-spacing:2px; }
    .sec-head-tag { font-size:0.6rem; border:1px solid; border-radius:20px; padding:2px 8px; }
    .tag-g { color:#ff6b9d; border-color:#ff6b9d; }
    .tag-c { color:#ff9f43; border-color:#ff9f43; }
    .sec-line { flex:1; height:1px; background:linear-gradient(90deg,rgba(231,76,60,0.4),transparent); }

    .grid-wrap { padding:0 10px 20px; }
    .stream-grid { display:grid; gap:9px; grid-template-columns:repeat(3,1fr); }
    @media(min-width:540px){ .stream-grid { grid-template-columns:repeat(4,1fr); } }

    .stream-card { position:relative; border-radius:10px; overflow:hidden; cursor:pointer; background:#1a1a22; aspect-ratio:9/14; border:1px solid rgba(255,255,255,0.05); transition:transform 0.2s; }
    .stream-card:hover { transform:translateY(-3px) scale(1.02); box-shadow:0 6px 24px rgba(231,76,60,0.3); }
    .stream-card img { width:100%; height:100%; object-fit:cover; display:block; }
    .card-grad { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,transparent 55%); }
    .live-pill { position:absolute; top:6px; left:6px; background:#e74c3c; color:#fff; font-family:'Orbitron',monospace; font-size:0.5rem; font-weight:700; padding:2px 6px; border-radius:3px; letter-spacing:1.5px; animation:liveblink 1.3s infinite; z-index:4; }
    @keyframes liveblink { 0%,100%{opacity:1;box-shadow:0 0 7px rgba(231,76,60,0.9)} 50%{opacity:0.4;box-shadow:none} }
    .offline-cover { position:absolute; inset:0; background:rgba(0,0,0,0.72); display:flex; align-items:center; justify-content:center; z-index:8; }
    .offline-label { font-family:'Orbitron',monospace; font-size:0.6rem; color:#555; letter-spacing:2px; }
    .card-info { position:absolute; bottom:0; left:0; right:0; padding:7px 8px; z-index:5; }
    .card-name { font-size:0.78rem; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-views { font-size:0.68rem; color:#f1c40f; display:flex; align-items:center; gap:3px; margin-top:1px; }

    /* OVERLAY */
    #profile-overlay { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.8); backdrop-filter:blur(4px); align-items:center; justify-content:center; padding:16px; }
    #profile-overlay.open { display:flex; }

    .profile-card { background:linear-gradient(145deg,#12112a,#1a0f1f); border:1px solid rgba(231,76,60,0.25); border-radius:20px; width:100%; max-width:340px; padding:22px 20px 18px; position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.7); animation:popIn 0.22s ease; }
    @keyframes popIn { from{opacity:0;transform:scale(0.88)} to{opacity:1;transform:scale(1)} }

    .profile-close { position:absolute; top:12px; right:12px; width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,0.08); border:none; color:#aaa; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    .pstatus { display:inline-flex; align-items:center; gap:5px; font-family:'Orbitron',monospace; font-size:0.55rem; font-weight:700; padding:4px 10px; border-radius:5px; letter-spacing:1px; margin-bottom:16px; }
    .pstatus.live { background:#e74c3c; color:#fff; animation:liveblink 1.3s infinite; }
    .pstatus.offline { background:rgba(255,255,255,0.06); color:#666; border:1px solid #333; }
    .sdot { width:6px; height:6px; border-radius:50%; background:currentColor; }

    .profile-avatar { width:80px; height:80px; border-radius:50%; background:#1a1a2e; margin:0 auto 14px; border:2px solid rgba(231,76,60,0.4); display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .profile-avatar img { width:100%; height:100%; object-fit:cover; }
    .avatar-ph { font-size:2rem; color:#444; }

    .profile-name-row { display:flex; align-items:center; gap:10px; margin-bottom:4px; flex-wrap:wrap; }
    .profile-name { font-family:'Orbitron',monospace; font-size:1rem; font-weight:700; color:#fff; }
    .profile-age { background:#2a2a1a; border:1px solid #f1c40f44; color:#f1c40f; font-size:0.7rem; font-weight:700; padding:2px 9px; border-radius:20px; }
    .profile-viewers { font-size:0.75rem; color:#888; display:flex; align-items:center; gap:5px; margin-bottom:16px; }

    .profile-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }

    /* Base stat box */
    .pstat { border-radius:10px; padding:10px 6px; text-align:center; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); }
    .pstat-icon { font-size:1.2rem; margin-bottom:4px; display:block; transition:transform 0.2s; }
    .pstat-val { font-family:'Orbitron',monospace; font-size:0.95rem; font-weight:700; display:block; }
    .val-green { color:#2ecc71; }
    .val-red { color:#e74c3c; }
    .val-fire { color:#f1c40f; }
    .pstat-label { font-size:0.6rem; color:#555; letter-spacing:1px; margin-top:2px; display:block; }

    /* Clickable stat boxes */
    .pstat-btn { cursor:pointer; user-select:none; transition:transform 0.15s, background 0.2s, border-color 0.2s; }
    .pstat-btn:hover { transform:translateY(-2px); }
    .pstat-btn:active { transform:scale(0.92) !important; }

    /* Like voted */
    .pstat-btn.vote-like { background:rgba(46,204,113,0.18) !important; border-color:#2ecc71 !important; }
    .pstat-btn.vote-like .pstat-icon { transform:scale(1.3); }

    /* Dislike voted */
    .pstat-btn.vote-dislike { background:rgba(231,76,60,0.18) !important; border-color:#e74c3c !important; }
    .pstat-btn.vote-dislike .pstat-icon { transform:scale(1.3); }

    @keyframes bump { 0%{transform:scale(1)} 40%{transform:scale(1.45)} 100%{transform:scale(1.3)} }
    .do-bump { animation:bump 0.28s ease forwards; }

    .profile-section-label { font-size:0.65rem; color:#777; letter-spacing:2px; margin-bottom:8px; }
    .profile-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
    .ptag { font-size:0.68rem; padding:3px 10px; border-radius:20px; font-weight:600; }
    .ptag.like { background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.3); color:#2ecc71; }
    .ptag.dislike { background:rgba(231,76,60,0.08); border:1px solid rgba(231,76,60,0.25); color:#e74c3c; }

    .profile-cta { width:100%; border:none; border-radius:12px; padding:13px; font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:1px; transition:filter 0.15s, transform 0.15s; margin-top:4px; }
    .cta-live { background:linear-gradient(90deg,#e74c3c,#c0392b); color:#fff; }
    .cta-live:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .cta-offline { background:rgba(255,255,255,0.05); color:#555; cursor:not-allowed; border:1px solid #333; }

    footer { text-align:center; padding:24px 16px; font-size:0.72rem; color:#333; }
  </style>
</head>
<body>

<div class="site-header">
  <div class="logo">VIP<span>LIVE</span></div>
  <div class="live-now-badge">
    <div class="green-dot"></div>
    <span id="total-live">0 LIVE NOW</span>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-item active" data-sec="sec-girls">Girls</div>
  <div class="tab-item" data-sec="sec-couples">Couples</div>
</div>

<main>
  <div id="sec-girls">
    <div class="sec-head">
      <span style="font-size:1.1rem">💋</span>
      <span class="sec-head-title">Girls</span>
      <span class="sec-head-tag tag-g">HOT</span>
      <div class="sec-line"></div>
    </div>
    <div class="grid-wrap"><div class="stream-grid" id="grid-girls"></div></div>
  </div>
  <div id="sec-couples">
    <div class="sec-head">
      <span style="font-size:1.1rem">💑</span>
      <span class="sec-head-title">Couples</span>
      <span class="sec-head-tag tag-c">POPULAR</span>
      <div class="sec-line"></div>
    </div>
    <div class="grid-wrap"><div class="stream-grid" id="grid-couples"></div></div>
  </div>
</main>

<footer>© 2024 VIPLive · Premium Content Platform · 18+ Only</footer>

<!-- PROFILE POPUP -->
<div id="profile-overlay">
  <div class="profile-card">
    <button class="profile-close" id="btn-close">✕</button>
    <div id="pop-status" class="pstatus"></div>
    <div class="profile-avatar">
      <img id="pop-img" src="" alt=""
        onerror="this.style.display='none';document.getElementById('pop-ph').style.display='block'"/>
      <span id="pop-ph" class="avatar-ph" style="display:none">👤</span>
    </div>
    <div class="profile-name-row">
      <span class="profile-name" id="pop-name"></span>
      <span class="profile-age"  id="pop-age"></span>
    </div>
    <div class="profile-viewers">👁 <span id="pop-viewers">0</span> viewers right now</div>

    <div class="profile-stats">
      <div class="pstat pstat-btn" id="box-like">
        <span class="pstat-icon" id="icon-like">👍</span>
        <span class="pstat-val val-green" id="pop-likes">0</span>
        <span class="pstat-label">LIKES</span>
      </div>
      <div class="pstat pstat-btn" id="box-dislike">
        <span class="pstat-icon" id="icon-dislike">👎</span>
        <span class="pstat-val val-red" id="pop-dislikes">0</span>
        <span class="pstat-label">DISLIKES</span>
      </div>
      <div class="pstat">
        <span class="pstat-icon">🔥</span>
        <span class="pstat-val val-fire" id="pop-rating">0%</span>
        <span class="pstat-label">RATING</span>
      </div>
    </div>

    <div class="profile-section-label">✓ LIKES</div>
    <div class="profile-tags" id="pop-like-tags"></div>
    <div class="profile-section-label">✕ DISLIKES</div>
    <div class="profile-tags" id="pop-dislike-tags"></div>

    <button class="profile-cta" id="pop-cta"></button>
  </div>
</div>

<script>
const profiles = {
  girls: [
    { id:"g1",  name:"Priya Sharma",  img:"g1.jpg",  video:"v1.mp4",  offline:false, age:24, likes:["Dancing","Cooking","Travel"],    dislikes:["Negativity","Rude people"],         rating:96 },
    { id:"g2",  name:"Anika Rao",     img:"g2.jpg",  video:"v2.mp4",  offline:false, age:26, likes:["Shopping","Good Vibes","Makeup","Night Owls","Reading"], dislikes:["Boring talks","Negativity","Rude people"], rating:97 },
    { id:"g3",  name:"Divya Kapoor",  img:"g3.jpg",  video:"v3.mp4",  offline:false,  age:23, likes:["Music","Yoga","Art"],             dislikes:["Drama","Hate"],                     rating:91 },
    { id:"g4",  name:"Sneha Verma",   img:"g4.jpg",  video:"v4.mp4",  offline:false, age:25, likes:["Fitness","Movies","Cooking"],     dislikes:["Negativity","Boring people"],       rating:94 },
    { id:"g5",  name:"Riya Malhotra", img:"g5.jpg",  video:"v5.mp4",  offline:false,  age:27, likes:["Comedy","Photography","Singing"], dislikes:["Drama","Rude people","Negativity"], rating:95 },
    { id:"g6",  name:"Kavya Singh",   img:"g6.jpg",  video:"v6.mp4",  offline:false, age:22, likes:["Gaming","Music","Travel"],        dislikes:["Fake people","Jealousy"],           rating:93 },
    { id:"g7",  name:"Pooja Gupta",   img:"g7.jpg",  video:"v7.mp4",  offline:false, age:28, likes:["Reading","Coffee","Nature"],      dislikes:["Negativity","Gossip"],              rating:90 },
    { id:"g8",  name:"Meera Joshi",   img:"g8.jpg",  video:"v8.mp4",  offline:false,  age:24, likes:["Dance","Fashion","Food"],         dislikes:["Rude people","Drama"],              rating:88 },
    { id:"g9",  name:"Tanya Bhatia",  img:"g9.jpg",  video:"v9.mp4",  offline:true, age:26, likes:["Singing","Makeup","Travel"],      dislikes:["Hate","Boring talks"],              rating:92 },
    { id:"g10", name:"Shreya Nair",   img:"g10.jpg", video:"v10.mp4", offline:true, age:23, likes:["Art","Yoga","Movies"],            dislikes:["Negativity","Fake vibes"],          rating:95 },
    { id:"g11", name:"Nikita Reddy",  img:"g11.jpg", video:"v11.mp4", offline:true, age:25, likes:["Photography","Travel","Fitness"], dislikes:["Drama","Rude people"],              rating:96 },
    { id:"g12", name:"Sonal Mehta",   img:"g12.jpg", video:"v12.mp4", offline:true, age:27, likes:["Cooking","Music","Shopping"],     dislikes:["Negativity","Gossip"],              rating:89 },
    { id:"g13", name:"Anjali Pandey", img:"g13.jpg", video:"v13.mp4", offline:true, age:22, likes:["Gaming","Comedy","Dance"],        dislikes:["Boring people","Hate"],             rating:93 },
    { id:"g14", name:"Komal Iyer",    img:"g14.jpg", video:"v14.mp4", offline:true, age:24, likes:["Reading","Coffee","Yoga"],        dislikes:["Fake people","Drama"],              rating:91 },
    { id:"g15", name:"Simran Khatri", img:"g15.jpg", video:"v15.mp4", offline:true, age:26, likes:["Fashion","Movies","Travel"],      dislikes:["Negativity","Rude people"],         rating:94 },
  ],
  couples: [
    { id:"c1", name:"Raj & Simran", img:"c1.jpg", video:"c1.mp4", offline:false, age:25, likes:["Travel","Music","Cooking"],   dislikes:["Negativity","Drama"],        rating:96 },
    { id:"c2", name:"Aryan & Riya", img:"c2.jpg", video:"c2.mp4", offline:false, age:24, likes:["Dancing","Movies","Fitness"], dislikes:["Rude people","Hate"],        rating:94 },
    { id:"c3", name:"Dev & Priya",  img:"c3.jpg", video:"c3.mp4", offline:false, age:26, likes:["Gaming","Food","Shopping"],   dislikes:["Boring talks","Fake vibes"], rating:92 },
    { id:"c4", name:"Karan & Asha", img:"c4.jpg", video:"c4.mp4", offline:true,  age:27, likes:["Photography","Art","Yoga"],   dislikes:["Negativity","Drama"],        rating:89 },
    { id:"c5", name:"Rahul & Tanu", img:"c5.jpg", video:"c5.mp4", offline:true, age:23, likes:["Comedy","Travel","Music"],    dislikes:["Rude people","Gossip"],      rating:95 },
  ],
};

// ── state ──
const vc    = {};
const stats = {};
let curP    = null;

function initStats(p) {
  if (!stats[p.id]) {
    stats[p.id] = {
      likes:    p.offline ? 0 : Math.floor(Math.random()*60)+40,
      dislikes: p.offline ? 0 : Math.floor(Math.random()*8)+1,
      vote: null   // null | 'like' | 'dislike'
    };
  }
}

// ── build grids ──
function buildGrid(gridId, items) {
  const el = document.getElementById(gridId);
  el.innerHTML = "";
  items.forEach(function(p) {
    vc[p.id] = p.offline ? 0 : Math.floor(Math.random()*81)+20;
    initStats(p);
    var card = document.createElement("div");
    card.className = "stream-card";
    card.innerHTML =
      '<img src="' + p.img + '" alt="' + p.name + '" onerror="this.style.background=\'#181828\';this.removeAttribute(\'src\')" loading="lazy"/>' +
      '<div class="card-grad"></div>' +
      (!p.offline ? '<div class="live-pill">LIVE</div>' : '') +
      '<div class="card-info">' +
        '<div class="card-name">' + p.name + '</div>' +
        '<div class="card-views">👁 <span id="v-' + p.id + '">' + vc[p.id] + '</span></div>' +
      '</div>' +
      (p.offline ? '<div class="offline-cover"><span class="offline-label">⛔ OFFLINE</span></div>' : '');
    card.addEventListener("click", function() { openPopup(p); });
    el.appendChild(card);
  });
}

// ── open popup ──
function openPopup(p) {
  curP = p;

  var st = document.getElementById("pop-status");
  if (p.offline) {
    st.className = "pstatus offline";
    st.innerHTML = '<span class="sdot"></span> OFFLINE';
  } else {
    st.className = "pstatus live";
    st.innerHTML = '<span class="sdot"></span> LIVE';
  }

  var img = document.getElementById("pop-img");
  img.style.display = "block";
  document.getElementById("pop-ph").style.display = "none";
  img.src = p.img;

  document.getElementById("pop-name").textContent    = p.name;
  document.getElementById("pop-age").textContent     = "Age " + p.age;
  document.getElementById("pop-viewers").textContent = p.offline ? 0 : vc[p.id];

  // like/dislike box opacity for offline
  var bl = document.getElementById("box-like");
  var bd = document.getElementById("box-dislike");
  if (p.offline) {
    bl.style.opacity = "0.35";
    bd.style.opacity = "0.35";
  } else {
    bl.style.opacity = "1";
    bd.style.opacity = "1";
  }

  renderStats();

  document.getElementById("pop-like-tags").innerHTML =
    p.likes.map(function(t){ return '<span class="ptag like">♥ ' + t + '</span>'; }).join("");
  document.getElementById("pop-dislike-tags").innerHTML =
    p.dislikes.map(function(t){ return '<span class="ptag dislike">✕ ' + t + '</span>'; }).join("");

  var cta = document.getElementById("pop-cta");
  if (p.offline) {
    cta.className   = "profile-cta cta-offline";
    cta.textContent = "⛔ CURRENTLY OFFLINE";
    cta.onclick     = null;
  } else {
    cta.className   = "profile-cta cta-live";
    cta.textContent = "▶ WATCH LIVE";
    cta.onclick = function() {
      localStorage.setItem("vip_profile", JSON.stringify({ id:p.id, name:p.name, img:p.img, video:p.video }));
      window.location.href = "live.html";
    };
  }

  document.getElementById("profile-overlay").classList.add("open");
}

// ── render stats ──
function renderStats() {
  if (!curP) return;
  var s  = stats[curP.id];
  var bl = document.getElementById("box-like");
  var bd = document.getElementById("box-dislike");

  document.getElementById("pop-likes").textContent    = s.likes;
  document.getElementById("pop-dislikes").textContent = s.dislikes;

  var total = s.likes + s.dislikes;
  var r     = total > 0 ? Math.round((s.likes / total) * 100) : curP.rating;
  document.getElementById("pop-rating").textContent = curP.offline ? "0%" : r + "%";

  // voted highlight
  bl.classList.toggle("vote-like",    s.vote === "like");
  bd.classList.toggle("vote-dislike", s.vote === "dislike");
}

// ── LIKE button ──
document.getElementById("box-like").addEventListener("click", function() {
  if (!curP || curP.offline) return;
  var s = stats[curP.id];
  if (s.vote === "like") {
    s.likes--;
    s.vote = null;
  } else {
    if (s.vote === "dislike") s.dislikes = Math.max(0, s.dislikes - 1);
    s.likes++;
    s.vote = "like";
    var icon = document.getElementById("icon-like");
    icon.classList.remove("do-bump");
    void icon.offsetWidth;
    icon.classList.add("do-bump");
  }
  renderStats();
});

// ── DISLIKE button ──
document.getElementById("box-dislike").addEventListener("click", function() {
  if (!curP || curP.offline) return;
  var s = stats[curP.id];
  if (s.vote === "dislike") {
    s.dislikes = Math.max(0, s.dislikes - 1);
    s.vote = null;
  } else {
    if (s.vote === "like") s.likes = Math.max(0, s.likes - 1);
    s.dislikes++;
    s.vote = "dislike";
    var icon = document.getElementById("icon-dislike");
    icon.classList.remove("do-bump");
    void icon.offsetWidth;
    icon.classList.add("do-bump");
  }
  renderStats();
});

// ── close ──
document.getElementById("btn-close").addEventListener("click", function() {
  document.getElementById("profile-overlay").classList.remove("open");
  curP = null;
});
document.getElementById("profile-overlay").addEventListener("click", function(e) {
  if (e.target === this) {
    this.classList.remove("open");
    curP = null;
  }
});

// ── init ──
buildGrid("grid-girls",   profiles.girls);
buildGrid("grid-couples", profiles.couples);

var liveCount = 0;
Object.values(profiles).flat().forEach(function(p){ if (!p.offline) liveCount++; });
document.getElementById("total-live").textContent = liveCount + " LIVE NOW";

// ── viewer ticker ──
setInterval(function() {
  Object.values(profiles).flat().forEach(function(p) {
    if (p.offline) return;
    var el = document.getElementById("v-" + p.id);
    if (!el) return;
    var v = vc[p.id] + Math.floor(Math.random()*5) - 2;
    v = Math.max(20, Math.min(100, v));
    vc[p.id] = v;
    el.textContent = v;
    if (curP && curP.id === p.id) document.getElementById("pop-viewers").textContent = v;
  });
}, 3000);

// ── tabs ──
var tabs   = document.querySelectorAll(".tab-item");
var OFFSET = 112;
tabs.forEach(function(tab) {
  tab.addEventListener("click", function() {
    var sec = document.getElementById(tab.dataset.sec);
    if (!sec) return;
    window.scrollTo({ top: sec.getBoundingClientRect().top + window.scrollY - OFFSET, behavior:"smooth" });
    tabs.forEach(function(t){ t.classList.remove("active"); });
    tab.classList.add("active");
  });
});
window.addEventListener("scroll", function() {
  var cur = "sec-girls";
  ["sec-girls","sec-couples"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el && window.scrollY + OFFSET + 5 >= el.offsetTop) cur = id;
  });
  tabs.forEach(function(t){ t.classList.remove("active"); });
  var f = Array.from(tabs).find(function(t){ return t.dataset.sec === cur; });
  if (f) f.classList.add("active");
}, { passive:true });
</script>
</body>
</html>
