  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, updateDoc, increment, serverTimestamp, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyApXJIZOaoQfSze9myODDs9Y6O2fW_IEwI",
      authDomain: "vip-live-5a1c1.firebaseapp.com",
      projectId: "vip-live-5a1c1",
      storageBucket: "vip-live-5a1c1.firebasestorage.app",
      messagingSenderId: "90875845422",
      appId: "1:90875845422:web:83b8f3d4c3781f44f4f8bf"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ══════════════════════════════════════════
    // VISITOR TRACKING
    // Uses sessionStorage so refreshing same tab
    // doesn't count as a new visit
    // ══════════════════════════════════════════
    async function trackVisit() {
      try {
        const alreadyCounted = sessionStorage.getItem('visit_counted');
        const statsRef = doc(db, 'siteStats', 'visitors');

        // Always increment total_visits (every page load)
        // unique_sessions only once per browser session
        if (!alreadyCounted) {
          sessionStorage.setItem('visit_counted', '1');

          // Try to update existing doc
          try {
            await updateDoc(statsRef, {
              total_visits:    increment(1),
              unique_sessions: increment(1),
              last_visit:      serverTimestamp(),
            });
          } catch (e) {
            // Doc doesn't exist yet — create it
            await setDoc(statsRef, {
              total_visits:    1,
              unique_sessions: 1,
              last_visit:      serverTimestamp(),
            });
          }
        } else {
          // Same session, still count page view
          try {
            await updateDoc(statsRef, {
              total_visits: increment(1),
              last_visit:   serverTimestamp(),
            });
          } catch (e) {
            await setDoc(statsRef, {
              total_visits: 1,
              unique_sessions: 1,
              last_visit: serverTimestamp(),
            });
          }
        }
      } catch (err) {
        // Silently fail — don't break the page
        console.warn('Visit tracking error:', err);
      }
    }

    trackVisit();
  </script>

<script>
const rnd = (a,b) => Math.floor(Math.random()*(b-a+1))+a;

const likesPool = [
  "Dancing","Chatting","Music","Gaming","Cooking","Fitness","Travel","Reading",
  "Art","Fashion","Movies","Photography","Yoga","Shopping","Singing","Comedy",
  "Makeup","Sports","Night Owls","Good Vibes"
];
const dislikesPool = [
  "Rude people","Spam","Fake users","Ghosting","Drama","Negativity","Late sleepers","Boring talks"
];

function pickRandom(arr, n) {
  const a = [...arr]; const r = [];
  while(r.length < n && a.length) {
    const i = Math.floor(Math.random()*a.length);
    r.push(a.splice(i,1)[0]);
  }
  return r;
}

    { id:"g7",  name:"Pooja Gupta",   img:"g7.jpg",  offline:true, age:29, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"g8",  name:"Meera Joshi",   img:"g8.jpg",  offline:true,  age:26, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"g9",  name:"Tanya Bhatia",  img:"g9.jpg",  offline:false, age:25, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"g10", name:"Shreya Nair",   img:"g10.jpg", offline:false, age:30, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"g11", name:"Nikita Reddy",  img:"g11.jpg", offline:true,  age:27, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"g12", name:"Sonal Mehta",   img:"g12.jpg", offline:true, age:24, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"g13", name:"Anjali Pandey", img:"g13.jpg", offline:false, age:28, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"g14", name:"Komal Iyer",    img:"g14.jpg", offline:true,  age:26, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"g15", name:"Simran Khatri", img:"g15.jpg", offline:false, age:25, likes:rnd(60,100), dislikes:rnd(1,5) },
  ],
  couples: [
    { id:"c1", name:"Annu & Simran", img:"c1.jpg", offline:false, age:25, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"c2", name:"Aryan & Riya",  img:"c2.jpg", offline:true,  age:27, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"c3", name:"Dev & Priya",   img:"c3.jpg", offline:true, age:26, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"c4", name:"Karan & Asha",  img:"c4.jpg", offline:false, age:28, likes:rnd(60,100), dislikes:rnd(1,5) },
    { id:"c5", name:"Rahul & Tanu",  img:"c5.jpg", offline:true,  age:24, likes:rnd(60,100), dislikes:rnd(1,5) },
  ],
};

const profileMeta = {};
[...profiles.girls, ...profiles.couples].forEach(p => {
  profileMeta[p.id] = {
    likeTags:    pickRandom(likesPool, rnd(3,5)),
    dislikeTags: pickRandom(dislikesPool, rnd(2,3)),
  };
});

const vc = {};
[...profiles.girls, ...profiles.couples].forEach(p => {
  vc[p.id] = p.offline ? 0 : rnd(20, 100);
});

const userVotes = {};
[...profiles.girls, ...profiles.couples].forEach(p => { userVotes[p.id] = null; });

let currentProfile = null;

function updateRating(p) {
  const rating = Math.round((p.likes / (p.likes + p.dislikes)) * 100);
  document.getElementById("modalRating").textContent = rating + "%";
}

function animateBump(el) {
  el.classList.remove("bump");
  void el.offsetWidth;
  el.classList.add("bump");
  el.addEventListener("animationend", () => el.classList.remove("bump"), { once: true });
}

document.getElementById("likeBox").addEventListener("click", () => {
  if (!currentProfile) return;
  const p = currentProfile;
  const prev = userVotes[p.id];
  if (prev === "like") {
    p.likes--; userVotes[p.id] = null;
    document.getElementById("likeBox").classList.remove("liked");
  } else {
    p.likes++; userVotes[p.id] = "like";
    document.getElementById("likeBox").classList.add("liked");
    animateBump(document.getElementById("modalLikes"));
    if (prev === "dislike") {
      p.dislikes--;
      document.getElementById("dislikeBox").classList.remove("disliked");
      document.getElementById("modalDislikes").textContent = p.dislikes;
    }
  }
  document.getElementById("modalLikes").textContent = p.likes;
  updateRating(p);
});

document.getElementById("dislikeBox").addEventListener("click", () => {
  if (!currentProfile) return;
  const p = currentProfile;
  const prev = userVotes[p.id];
  if (prev === "dislike") {
    p.dislikes--; userVotes[p.id] = null;
    document.getElementById("dislikeBox").classList.remove("disliked");
  } else {
    p.dislikes++; userVotes[p.id] = "dislike";
    document.getElementById("dislikeBox").classList.add("disliked");
    animateBump(document.getElementById("modalDislikes"));
    if (prev === "like") {
      p.likes--;
      document.getElementById("likeBox").classList.remove("liked");
      document.getElementById("modalLikes").textContent = p.likes;
    }
  }
  document.getElementById("modalDislikes").textContent = p.dislikes;
  updateRating(p);
});

function openModal(p) {
  currentProfile = p;
  const meta = profileMeta[p.id];
  document.getElementById("modalPhoto").src = p.img;
  document.getElementById("modalPhoto").style.display = "block";
  document.getElementById("modalPhotoFallback").style.display = "none";
  document.getElementById("modalName").textContent = p.name;
  document.getElementById("modalAge").textContent  = `Age ${p.age}`;
  document.getElementById("modalViews").textContent = p.offline ? 0 : vc[p.id];
  document.getElementById("modalLikes").textContent    = p.likes;
  document.getElementById("modalDislikes").textContent = p.dislikes;
  const rating = Math.round((p.likes / (p.likes + p.dislikes)) * 100);
  document.getElementById("modalRating").textContent = rating + "%";
  document.getElementById("modalLiveBadge").style.display   = p.offline ? "none"  : "block";
  document.getElementById("modalOfflineBadge").style.display = p.offline ? "block" : "none";

  const likeBox    = document.getElementById("likeBox");
  const dislikeBox = document.getElementById("dislikeBox");
  likeBox.classList.remove("liked");
  dislikeBox.classList.remove("disliked");
  if (userVotes[p.id] === "like")    likeBox.classList.add("liked");
  if (userVotes[p.id] === "dislike") dislikeBox.classList.add("disliked");

  document.getElementById("modalLikeTags").innerHTML    = meta.likeTags.map(t=>`<span class="modal-tag tag-like">♥ ${t}</span>`).join("");
  document.getElementById("modalDislikeTags").innerHTML = meta.dislikeTags.map(t=>`<span class="modal-tag tag-dislike">✕ ${t}</span>`).join("");

  const btn = document.getElementById("modalWatchBtn");
  if (p.offline) {
    btn.className   = "modal-watch-btn offline-btn";
    btn.textContent = "⛔ CURRENTLY OFFLINE";
    btn.onclick     = null;
  } else {
    btn.className   = "modal-watch-btn";
    btn.textContent = "▶ WATCH LIVE";
    btn.onclick = () => {
      localStorage.setItem("vip_profile", JSON.stringify({
        id: p.id, name: p.name, img: p.img, viewers: vc[p.id]
      }));
      window.location.href = "live.html";
    };
  }
  document.getElementById("profileModal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("profileModal").classList.remove("open");
  document.body.style.overflow = "";
  currentProfile = null;
}

document.getElementById("modalClose").onclick = closeModal;
document.getElementById("profileModal").addEventListener("click", e => {
  if (e.target === document.getElementById("profileModal")) closeModal();
});

function buildGrid(gridId, items) {
  const el = document.getElementById(gridId);
  el.innerHTML = "";
  items.forEach(p => {
    const card = document.createElement("div");
    card.className = "stream-card";
    const displayViews = p.offline ? 0 : vc[p.id];
    card.innerHTML = `
      <img src="${p.img}" alt="${p.name}"
        onerror="this.style.background='#181828';this.removeAttribute('src')"
        loading="lazy"/>
      <div class="card-grad"></div>
      ${p.offline ? '' : '<div class="live-pill">LIVE</div>'}
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-views">👁 <span id="v-${p.id}">${displayViews}</span></div>
      </div>
      ${p.offline ? '<div class="offline-cover"><span class="offline-label">⛔ OFFLINE</span></div>' : ''}
    `;
    card.addEventListener("click", () => openModal(p));
    el.appendChild(card);
  });
}

buildGrid("grid-girls",   profiles.girls);
buildGrid("grid-couples", profiles.couples);

const liveCount = [...profiles.girls, ...profiles.couples].filter(p=>!p.offline).length;
document.getElementById("total-live").textContent = `${liveCount} LIVE NOW`;

setInterval(() => {
  Object.keys(vc).forEach(id => {
    const el = document.getElementById(`v-${id}`);
    if (!el) return;
    const prof = [...profiles.girls,...profiles.couples].find(p=>p.id===id);
    if (!prof || prof.offline) return;
    let v = vc[id] + Math.floor(Math.random()*5) - 2;
    v = Math.max(20, Math.min(100, v));
    vc[id] = v;
    el.textContent = v;
    if (currentProfile && currentProfile.id === id)
      document.getElementById("modalViews").textContent = v;
  });
}, 3000);

const tabs   = document.querySelectorAll(".tab-item");
const OFFSET = 112;
tabs.forEach(tab => {
  tab.addEventListener("click", () => {
    const sec = document.getElementById(tab.dataset.sec);
    if (!sec) return;
    const top = sec.getBoundingClientRect().top + window.scrollY - OFFSET;
    window.scrollTo({ top, behavior: "smooth" });
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
  });
});
const secIds = ["sec-girls","sec-couples"];
window.addEventListener("scroll", () => {
  let cur = "sec-girls";
  secIds.forEach(id => {
    const el = document.getElementById(id);
    if (el && window.scrollY + OFFSET + 5 >= el.offsetTop) cur = id;
  });
  tabs.forEach(t => t.classList.remove("active"));
  const found = [...tabs].find(t => t.dataset.sec === cur);
  if (found) found.classList.add("active");
}, { passive:true });
</script>
